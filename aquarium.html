<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐠 My Aquarium</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#07101e;color:#cce;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;gap:10px;}

h1{font-size:1.8rem;background:linear-gradient(90deg,#00c6ff,#0072ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;}
.subtitle{color:#556;font-size:.82rem;text-align:center;margin-top:-4px;}

.main{display:flex;gap:10px;width:100%;max-width:1280px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}

/* ═══ LEFT SIDEBAR ═══ */
.sidebar{display:flex;flex-direction:column;gap:8px;width:170px;flex-shrink:0;}

.panel{background:#0c1929;border:1px solid #162a44;border-radius:12px;padding:10px;}
.panel-title{font-size:.7rem;font-weight:700;letter-spacing:.08em;color:#5588aa;text-transform:uppercase;margin-bottom:8px;}

/* Tools */
.tool-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.tb{background:#0f2035;border:1.5px solid #1e3a5a;color:#99bbcc;border-radius:7px;padding:5px 4px;cursor:pointer;font-size:.78rem;text-align:center;transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.1;}
.tb:hover{background:#162d4a;border-color:#3a6a8a;}
.tb.active{background:#0058cc;border-color:#0088ff;color:#fff;}
.tb .ti{font-size:1rem;}
.tb .tl{font-size:.6rem;}

/* Brush size */
.size-row{display:flex;align-items:center;gap:6px;font-size:.72rem;color:#556688;margin-top:4px;}
.size-row input{flex:1;accent-color:#0072ff;}

/* Color guide */
.color-guide{display:flex;flex-direction:column;gap:4px;}
.cg-group{margin-bottom:6px;}
.cg-label{font-size:.6rem;color:#445566;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.cg-swatches{display:flex;flex-wrap:wrap;gap:3px;}
.cg-sw{width:20px;height:20px;border-radius:4px;cursor:pointer;border:1.5px solid transparent;transition:transform .1s;position:relative;}
.cg-sw:hover{transform:scale(1.25);z-index:10;}
.cg-sw.selected{border-color:#fff;transform:scale(1.15);}
.cg-sw .cg-tip{display:none;position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:#000c;color:#fff;font-size:.6rem;padding:2px 5px;border-radius:4px;white-space:nowrap;pointer-events:none;}
.cg-sw:hover .cg-tip{display:block;}

/* Custom color */
.custom-color-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
.custom-color-row label{font-size:.65rem;color:#556688;}
#customColor{width:28px;height:22px;border:none;border-radius:4px;cursor:pointer;padding:1px;}

/* Guides */
.guide-list{display:flex;flex-direction:column;gap:4px;}
.guide-item{display:flex;align-items:center;gap:6px;cursor:pointer;padding:5px 7px;border-radius:7px;border:1px solid #162a44;background:#0f1e30;transition:all .12s;font-size:.75rem;color:#88aacc;}
.guide-item:hover{background:#162d4a;border-color:#3a6a8a;}
.guide-item.active{background:#0058cc22;border-color:#0072ff;color:#aaccff;}
.guide-canvas{border-radius:4px;background:#ffffff11;}

/* ═══ CENTER ═══ */
.center{display:flex;flex-direction:column;gap:8px;flex:1;min-width:260px;max-width:320px;}

.draw-header{font-size:.85rem;color:#7ecfff;font-weight:600;text-align:center;}

#drawWrap{position:relative;border-radius:12px;overflow:hidden;border:2px solid #1a3a5c;background:#fff;}
#drawCanvas{display:block;cursor:crosshair;touch-action:none;}
#overlayCanvas{position:absolute;top:0;left:0;pointer-events:none;opacity:.35;}

.canvas-actions{display:flex;gap:6px;justify-content:center;}

/* Release settings */
.release-form{background:#0c1929;border:1px solid #162a44;border-radius:12px;padding:10px;display:flex;flex-direction:column;gap:7px;}
.rf-row{display:flex;align-items:center;gap:8px;}
.rf-label{font-size:.7rem;color:#5588aa;width:46px;flex-shrink:0;}
.rf-input{background:#0f2035;border:1px solid #1e3a5a;color:#cce;border-radius:6px;padding:4px 8px;font-size:.78rem;flex:1;}
.rf-input:focus{outline:none;border-color:#0072ff;}

/* Speed picker */
.speed-opts{display:flex;gap:4px;flex:1;}
.speed-opt{flex:1;background:#0f2035;border:1.5px solid #1e3a5a;color:#88aacc;border-radius:6px;padding:3px 2px;cursor:pointer;font-size:.62rem;text-align:center;transition:all .12s;}
.speed-opt:hover{background:#162d4a;}
.speed-opt.sel{background:#0058cc;border-color:#0088ff;color:#fff;}

/* Type toggle */
.type-toggle{display:flex;gap:4px;flex:1;}
.type-btn{flex:1;background:#0f2035;border:1.5px solid #1e3a5a;color:#88aacc;border-radius:6px;padding:4px;cursor:pointer;font-size:.72rem;text-align:center;transition:all .12s;}
.type-btn:hover{background:#162d4a;}
.type-btn.sel{background:#006622;border-color:#00aa44;color:#aaffcc;}
.type-btn.sel.fish{background:#0058cc;border-color:#0088ff;color:#fff;}

/* ═══ RIGHT - AQUARIUM ═══ */
.aq-wrap{flex:1;min-width:300px;display:flex;flex-direction:column;gap:8px;}
.aq-wrap h2{font-size:.85rem;color:#7ecfff;font-weight:600;text-align:center;}
#aquariumCanvas{display:block;border-radius:14px;width:100%;border:2px solid #1a3a5c;}
.aq-controls{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}

/* ═══ BUTTONS ═══ */
.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .15s;}
.btn-primary{background:linear-gradient(135deg,#0072ff,#7b2ff7);color:#fff;}
.btn-primary:hover{opacity:.85;transform:scale(1.02);}
.btn-green{background:linear-gradient(135deg,#00aa44,#00cc88);color:#fff;}
.btn-green:hover{opacity:.85;transform:scale(1.02);}
.btn-sm{background:#0f2035;color:#88aacc;border:1px solid #1e3a5a;padding:5px 10px;font-size:.75rem;}
.btn-sm:hover{background:#162d4a;}
.btn-danger{background:#441122;color:#ff6688;border:1px solid #662233;}
.btn-danger:hover{background:#662233;}

/* ═══ GALLERY ═══ */
.gallery{width:100%;max-width:1280px;}
.gallery h2{font-size:.82rem;color:#5588aa;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.gallery-items{display:flex;gap:8px;flex-wrap:wrap;}
.gi{background:#0c1929;border:1.5px solid #162a44;border-radius:10px;padding:6px;display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;transition:border-color .12s;}
.gi:hover{border-color:#0072ff;}
.gi canvas{border-radius:6px;display:block;}
.gi-name{font-size:.6rem;color:#5588aa;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}
.gi-tag{font-size:.55rem;padding:1px 5px;border-radius:3px;font-weight:700;}
.gi-tag.fish{background:#0058cc22;color:#4499ff;}
.gi-tag.plant{background:#006622aa;color:#44ffaa;}
.gi-actions{display:flex;gap:4px;}
.gi-btn{background:#0f2035;border:1px solid #1e3a5a;color:#88aacc;border-radius:5px;padding:2px 7px;cursor:pointer;font-size:.6rem;transition:all .1s;}
.gi-btn:hover{background:#162d4a;}
.gi-btn.edit:hover{background:#003388;border-color:#0055cc;color:#aaccff;}
.gi-btn.del:hover{background:#441122;border-color:#662233;color:#ff6688;}
.gi-editing{position:absolute;top:-6px;right:-6px;background:#ffaa00;color:#000;font-size:.55rem;padding:1px 5px;border-radius:4px;font-weight:700;}

.empty-msg{color:#223344;font-size:.78rem;font-style:italic;}

/* Edit banner */
.edit-banner{background:#1a3300;border:1px solid #336600;border-radius:8px;padding:6px 10px;font-size:.75rem;color:#88ff66;text-align:center;display:none;}
.edit-banner.show{display:block;}
</style>
</head>
<body>

<h1>🐠 My Aquarium</h1>
<p class="subtitle">Draw fish & plants, then release them into the tank!</p>

<div class="main">

  <!-- ═══ LEFT SIDEBAR ═══ -->
  <div class="sidebar">

    <!-- TOOLS -->
    <div class="panel">
      <div class="panel-title">🖌️ Tools</div>
      <div class="tool-grid" id="toolGrid">
        <button class="tb active" data-tool="pen"><span class="ti">✏️</span><span class="tl">Pen</span></button>
        <button class="tb" data-tool="fill"><span class="ti">🪣</span><span class="tl">Fill</span></button>
        <button class="tb" data-tool="eraser"><span class="ti">🧹</span><span class="tl">Eraser</span></button>
        <button class="tb" data-tool="line"><span class="ti">╱</span><span class="tl">Line</span></button>
        <button class="tb" data-tool="rect"><span class="ti">▭</span><span class="tl">Rect</span></button>
        <button class="tb" data-tool="ellipse"><span class="ti">⬭</span><span class="tl">Ellipse</span></button>
        <button class="tb" data-tool="triangle"><span class="ti">△</span><span class="tl">Triangle</span></button>
        <button class="tb" data-tool="star"><span class="ti">⭐</span><span class="tl">Star</span></button>
      </div>
      <div class="size-row">
        <span>Size</span>
        <input type="range" id="brushSize" min="1" max="32" value="5">
        <span id="sizeLabel">5px</span>
      </div>
    </div>

    <!-- COLOR GUIDE -->
    <div class="panel">
      <div class="panel-title">🎨 Colors</div>
      <div class="color-guide" id="colorGuide"></div>
      <div class="custom-color-row">
        <label>Custom:</label>
        <input type="color" id="customColor" value="#ff6600">
        <span id="customSwatch" style="width:20px;height:20px;border-radius:4px;background:#ff6600;border:1.5px solid #fff;cursor:pointer;"></span>
      </div>
    </div>

    <!-- FISH GUIDES -->
    <div class="panel">
      <div class="panel-title">🐟 Outline Guides</div>
      <div class="guide-list" id="guideList"></div>
      <button class="btn btn-sm" style="width:100%;margin-top:6px;font-size:.65rem;" onclick="clearGuide()">Hide Guide</button>
    </div>

  </div>

  <!-- ═══ CENTER - DRAW ═══ -->
  <div class="center">
    <div class="draw-header">✏️ Draw Here</div>

    <div class="edit-banner" id="editBanner">✏️ Editing a fish — redraw and re-release to update!</div>

    <div id="drawWrap">
      <canvas id="drawCanvas" width="290" height="230"></canvas>
      <canvas id="overlayCanvas" width="290" height="230"></canvas>
    </div>

    <!-- Release form -->
    <div class="release-form">
      <div class="rf-row">
        <span class="rf-label">Name</span>
        <input class="rf-input" id="fishName" placeholder="e.g. Bubbles" maxlength="18">
      </div>
      <div class="rf-row">
        <span class="rf-label">Type</span>
        <div class="type-toggle">
          <button class="type-btn sel fish" id="typefish" onclick="setType('fish')">🐟 Fish</button>
          <button class="type-btn" id="typeplant" onclick="setType('plant')">🌿 Plant</button>
        </div>
      </div>
      <div class="rf-row" id="speedRow">
        <span class="rf-label">Speed</span>
        <div class="speed-opts">
          <div class="speed-opt" data-speed="0.35" onclick="setSpeed(this)">🐌<br>Lazy</div>
          <div class="speed-opt sel" data-speed="1.0" onclick="setSpeed(this)">🐟<br>Calm</div>
          <div class="speed-opt" data-speed="1.8" onclick="setSpeed(this)">🐠<br>Active</div>
          <div class="speed-opt" data-speed="3.0" onclick="setSpeed(this)">⚡<br>Speedy</div>
        </div>
      </div>
    </div>

    <div class="canvas-actions">
      <button class="btn btn-sm" onclick="clearCanvas()">🗑️ Clear</button>
      <button class="btn btn-green" onclick="release()" id="releaseBtn">🐟 Add to Tank!</button>
    </div>
    <div style="font-size:.7rem;color:#334455;text-align:center;" id="fishCount">0 in tank</div>
  </div>

  <!-- ═══ RIGHT - AQUARIUM ═══ -->
  <div class="aq-wrap">
    <h2>🌊 Live Aquarium</h2>
    <canvas id="aquariumCanvas" width="580" height="440"></canvas>
    <div class="aq-controls">
      <button class="btn btn-sm" onclick="showBubbles=!showBubbles">🫧 Bubbles</button>
      <button class="btn btn-sm" onclick="toggleNight()">🌙 Night</button>
      <button class="btn btn-sm" onclick="spawnDeco()">🪨 Deco</button>
      <button class="btn btn-sm btn-danger" onclick="clearTank()">🧹 Empty</button>
    </div>
  </div>

</div>

<!-- GALLERY -->
<div class="gallery" id="gallerySection" style="display:none;">
  <h2>Your Collection</h2>
  <div class="gallery-items" id="galleryItems">
    <span class="empty-msg">No fish yet — draw one!</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
const dc = document.getElementById('drawCanvas').getContext('2d');
const oc = document.getElementById('overlayCanvas').getContext('2d');
const drawCanvas = document.getElementById('drawCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const aq = document.getElementById('aquariumCanvas');
const ac = aq.getContext('2d');

let tool = 'pen';
let drawing = false;
let brushColor = '#ff6600';
let brushSize = 5;
let lastX=0, lastY=0;
let startX=0, startY=0;
let snapshot = null;
let currentGuide = null;
let editingId = null;
let releaseType = 'fish';
let releaseSpeed = 1.0;
let showBubbles = true;
let nightMode = false;
let tick = 0;
let fishes = [];
let plants = [];
let bubbles = [];
let decos = [];

// ═══════════════════════════════════════════════════
//  COLOR PALETTE
// ═══════════════════════════════════════════════════
const COLOR_GROUPS = [
  { label:'🐠 Fish Colors', colors:[
    {hex:'#ff4500',name:'Clownfish'},
    {hex:'#ff8c00',name:'Goldfish'},
    {hex:'#ffd700',name:'Yellow Tang'},
    {hex:'#ff69b4',name:'Pink Fairy'},
    {hex:'#ff1493',name:'Deep Pink'},
    {hex:'#dc143c',name:'Crimson'},
  ]},
  { label:'🌊 Ocean Blues', colors:[
    {hex:'#00bfff',name:'Sky Blue'},
    {hex:'#1e90ff',name:'Ocean'},
    {hex:'#4169e1',name:'Royal Blue'},
    {hex:'#483d8b',name:'Deep Sea'},
    {hex:'#00ced1',name:'Turquoise'},
    {hex:'#48d1cc',name:'Med Turq'},
  ]},
  { label:'🌿 Plants & Greens', colors:[
    {hex:'#228b22',name:'Forest'},
    {hex:'#32cd32',name:'Lime'},
    {hex:'#006400',name:'Dark Green'},
    {hex:'#7cfc00',name:'Lawn'},
    {hex:'#3cb371',name:'Sea Green'},
    {hex:'#20b2aa',name:'Teal'},
  ]},
  { label:'🪸 Coral & Warm', colors:[
    {hex:'#ff7f50',name:'Coral'},
    {hex:'#fa8072',name:'Salmon'},
    {hex:'#e9967a',name:'Dark Salmon'},
    {hex:'#ff6347',name:'Tomato'},
    {hex:'#dda0dd',name:'Plum'},
    {hex:'#da70d6',name:'Orchid'},
  ]},
  { label:'⬛ Neutral', colors:[
    {hex:'#ffffff',name:'White'},
    {hex:'#d3d3d3',name:'Silver'},
    {hex:'#808080',name:'Gray'},
    {hex:'#2f4f4f',name:'Dark Teal'},
    {hex:'#000000',name:'Black'},
    {hex:'#f5deb3',name:'Wheat'},
  ]},
];

function buildColorGuide(){
  const cg = document.getElementById('colorGuide');
  cg.innerHTML='';
  COLOR_GROUPS.forEach(g=>{
    const div = document.createElement('div');
    div.className='cg-group';
    div.innerHTML=`<div class="cg-label">${g.label}</div>`;
    const sw = document.createElement('div');
    sw.className='cg-swatches';
    g.colors.forEach(c=>{
      const s=document.createElement('div');
      s.className='cg-sw'+(c.hex===brushColor?' selected':'');
      s.style.background=c.hex;
      s.innerHTML=`<span class="cg-tip">${c.name}</span>`;
      s.onclick=()=>{ selectColor(c.hex); };
      sw.appendChild(s);
    });
    div.appendChild(sw);
    cg.appendChild(div);
  });
}

function selectColor(hex){
  brushColor=hex;
  document.querySelectorAll('.cg-sw').forEach(s=>s.classList.remove('selected'));
  // Mark matching swatch
  document.querySelectorAll('.cg-sw').forEach(s=>{
    if(s.style.background === hex || rgbToHex(s.style.background)===hex.toLowerCase()) s.classList.add('selected');
  });
  document.getElementById('customColor').value=hex;
  document.getElementById('customSwatch').style.background=hex;
  if(tool==='eraser') setTool('pen');
}

function rgbToHex(rgb){
  const m=rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if(!m) return rgb.toLowerCase();
  return '#'+[m[1],m[2],m[3]].map(v=>parseInt(v).toString(16).padStart(2,'0')).join('');
}

document.getElementById('customColor').oninput=function(){
  brushColor=this.value;
  document.getElementById('customSwatch').style.background=this.value;
  document.querySelectorAll('.cg-sw').forEach(s=>s.classList.remove('selected'));
};
document.getElementById('customSwatch').onclick=()=>document.getElementById('customColor').click();

buildColorGuide();

// ═══════════════════════════════════════════════════
//  TOOLS
// ═══════════════════════════════════════════════════
document.getElementById('toolGrid').querySelectorAll('.tb').forEach(btn=>{
  btn.onclick=()=>setTool(btn.dataset.tool);
});

function setTool(t){
  tool=t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.toggle('active',b.dataset.tool===t));
}

document.getElementById('brushSize').oninput=function(){
  brushSize=+this.value;
  document.getElementById('sizeLabel').textContent=brushSize+'px';
};

function clearCanvas(){
  dc.clearRect(0,0,drawCanvas.width,drawCanvas.height);
}

// ═══════════════════════════════════════════════════
//  FLOOD FILL
// ═══════════════════════════════════════════════════
function floodFill(x,y,fillHex){
  const imgData=dc.getImageData(0,0,drawCanvas.width,drawCanvas.height);
  const d=imgData.data, w=drawCanvas.width, h=drawCanvas.height;
  const i0=(Math.floor(y)*w+Math.floor(x))*4;
  const tr=d[i0],tg=d[i0+1],tb=d[i0+2],ta=d[i0+3];
  const [fr,fg,fb]=hexToRgb(fillHex);
  if(tr===fr&&tg===fg&&tb===fb&&ta===255) return;
  const stack=[[Math.floor(x),Math.floor(y)]];
  const visited=new Uint8Array(w*h);
  while(stack.length){
    const [cx,cy]=stack.pop();
    if(cx<0||cx>=w||cy<0||cy>=h) continue;
    const i=(cy*w+cx)*4;
    if(visited[cy*w+cx]) continue;
    if(d[i]!==tr||d[i+1]!==tg||d[i+2]!==tb||d[i+3]!==ta) continue;
    visited[cy*w+cx]=1;
    d[i]=fr;d[i+1]=fg;d[i+2]=fb;d[i+3]=255;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  dc.putImageData(imgData,0,0);
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16);
  const g=parseInt(hex.slice(3,5),16);
  const b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

// ═══════════════════════════════════════════════════
//  SHAPE DRAWING
// ═══════════════════════════════════════════════════
function drawShape(ctx,t,x0,y0,x1,y1,color,size,preview=false){
  ctx.save();
  ctx.strokeStyle=color;
  ctx.fillStyle=color;
  ctx.lineWidth=size;
  ctx.lineCap='round';
  ctx.lineJoin='round';
  if(preview){ctx.globalAlpha=0.7;}
  switch(t){
    case 'line':
      ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();break;
    case 'rect':
      ctx.beginPath();ctx.strokeRect(x0,y0,x1-x0,y1-y0);break;
    case 'ellipse':{
      const rx=Math.abs(x1-x0)/2,ry=Math.abs(y1-y0)/2;
      const cx=(x0+x1)/2,cy=(y0+y1)/2;
      ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.stroke();break;}
    case 'triangle':
      ctx.beginPath();
      ctx.moveTo((x0+x1)/2,y0);
      ctx.lineTo(x1,y1);ctx.lineTo(x0,y1);ctx.closePath();ctx.stroke();break;
    case 'star':{
      const cx2=(x0+x1)/2,cy2=(y0+y1)/2;
      const outerR=Math.max(Math.abs(x1-x0),Math.abs(y1-y0))/2;
      const innerR=outerR*0.42;
      ctx.beginPath();
      for(let i=0;i<10;i++){
        const r=i%2===0?outerR:innerR;
        const angle=i*Math.PI/5-Math.PI/2;
        i===0?ctx.moveTo(cx2+r*Math.cos(angle),cy2+r*Math.sin(angle))
             :ctx.lineTo(cx2+r*Math.cos(angle),cy2+r*Math.sin(angle));
      }
      ctx.closePath();ctx.stroke();break;}
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════
//  CANVAS EVENTS
// ═══════════════════════════════════════════════════
const SHAPE_TOOLS=['line','rect','ellipse','triangle','star'];

function getPos(e){
  const rect=drawCanvas.getBoundingClientRect();
  const scaleX=drawCanvas.width/rect.width;
  const scaleY=drawCanvas.height/rect.height;
  const src=e.touches?e.touches[0]:e;
  return [(src.clientX-rect.left)*scaleX,(src.clientY-rect.top)*scaleY];
}

function onDown(e){
  const [x,y]=getPos(e);
  if(tool==='fill'){floodFill(x,y,brushColor);return;}
  drawing=true;
  [startX,startY]=[x,y];
  [lastX,lastY]=[x,y];
  if(SHAPE_TOOLS.includes(tool)){
    snapshot=dc.getImageData(0,0,drawCanvas.width,drawCanvas.height);
  } else {
    dc.beginPath();dc.moveTo(x,y);
  }
}

function onMove(e){
  if(!drawing)return;
  const [x,y]=getPos(e);
  if(SHAPE_TOOLS.includes(tool)){
    dc.putImageData(snapshot,0,0);
    drawShape(dc,tool,startX,startY,x,y,brushColor,brushSize);
  } else {
    dc.lineWidth=brushSize;
    dc.lineCap='round';dc.lineJoin='round';
    if(tool==='eraser'){
      dc.globalCompositeOperation='destination-out';
      dc.strokeStyle='rgba(0,0,0,1)';
    } else {
      dc.globalCompositeOperation='source-over';
      dc.strokeStyle=brushColor;
    }
    dc.beginPath();dc.moveTo(lastX,lastY);dc.lineTo(x,y);dc.stroke();
    dc.globalCompositeOperation='source-over';
  }
  [lastX,lastY]=[x,y];
}

function onUp(){
  drawing=false;
  snapshot=null;
  dc.globalCompositeOperation='source-over';
}

const GUIDES = [
  { name:'Classic Fish', emoji:'🐟', fn: drawFishGuide },
  { name:'Round Puffer', emoji:'🐡', fn: drawPufferGuide },
  { name:'Angel Fish',   emoji:'🦋', fn: drawAngelGuide },
  { name:'Shark',        emoji:'🦈', fn: drawSharkGuide },
  { name:'Eel / Snake',  emoji:'🐍', fn: drawEelGuide },
  { name:'Flower Plant', emoji:'🌸', fn: drawFlowerGuide },
  { name:'Seaweed',      emoji:'🌿', fn: drawSeaweedGuide },
];

function buildGuideList(){
  const gl=document.getElementById('guideList');
  gl.innerHTML='';
  GUIDES.forEach((g,i)=>{
    const div=document.createElement('div');
    div.className='guide-item';
    div.dataset.idx=i;
    div.innerHTML=`<span style="font-size:1.1rem">${g.emoji}</span><span>${g.name}</span>`;
    div.onclick=()=>{
      document.querySelectorAll('.guide-item').forEach(d=>d.classList.remove('active'));
      if(currentGuide===i){currentGuide=null;clearOverlay();}
      else{currentGuide=i;div.classList.add('active');drawOverlay(i);}
    };
    gl.appendChild(div);
  });
}

function clearGuide(){
  currentGuide=null;
  document.querySelectorAll('.guide-item').forEach(d=>d.classList.remove('active'));
  clearOverlay();
}

function clearOverlay(){oc.clearRect(0,0,overlayCanvas.width,overlayCanvas.height);}

function drawOverlay(i){
  clearOverlay();
  oc.save();
  oc.strokeStyle='#0088ff';
  oc.fillStyle='rgba(0,150,255,0.12)';
  oc.lineWidth=2.5;
  oc.setLineDash([6,4]);
  oc.lineDashOffset=0;
  GUIDES[i].fn(oc,overlayCanvas.width,overlayCanvas.height);
  oc.restore();
}

function drawFishGuide(ctx,w,h){
  const cx=w*0.42,cy=h*0.5,bw=w*0.55,bh=h*0.38;
  // Body
  ctx.beginPath();ctx.ellipse(cx,cy,bw/2,bh/2,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Tail
  ctx.beginPath();ctx.moveTo(cx-bw/2+4,cy);ctx.lineTo(cx-bw/2-bw*0.28,cy-h*0.2);ctx.lineTo(cx-bw/2-bw*0.28,cy+h*0.2);ctx.closePath();ctx.fill();ctx.stroke();
  // Eye
  ctx.setLineDash([]);ctx.beginPath();ctx.arc(cx+bw*0.25,cy-bh*0.08,5,0,Math.PI*2);ctx.fillStyle='rgba(0,100,200,0.5)';ctx.fill();ctx.stroke();
  // Dorsal fin
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(cx-bw*0.1,cy-bh/2);ctx.quadraticCurveTo(cx+bw*0.05,cy-bh,cx+bw*0.2,cy-bh/2);ctx.stroke();
}
function drawPufferGuide(ctx,w,h){
  const cx=w/2,cy=h/2,r=Math.min(w,h)*0.32;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();ctx.stroke();
  // spines
  ctx.setLineDash([]);
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.lineTo(cx+(r+12)*Math.cos(a),cy+(r+12)*Math.sin(a));ctx.stroke();
  }
  ctx.beginPath();ctx.arc(cx+r*0.35,cy-r*0.15,r*0.12,0,Math.PI*2);ctx.fillStyle='rgba(0,100,200,0.5)';ctx.fill();
}
function drawAngelGuide(ctx,w,h){
  const cx=w/2,cy=h/2;
  // body (tall diamond-ish)
  ctx.beginPath();ctx.ellipse(cx,cy,w*0.2,h*0.38,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  // top fin
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(cx-w*0.12,cy-h*0.28);ctx.lineTo(cx,cy-h*0.48);ctx.lineTo(cx+w*0.05,cy-h*0.28);ctx.stroke();
  // long flowing fins (sides)
  ctx.beginPath();ctx.moveTo(cx-w*0.12,cy+h*0.25);ctx.quadraticCurveTo(cx-w*0.42,cy+h*0.1,cx-w*0.08,cy-h*0.15);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+w*0.12,cy+h*0.25);ctx.quadraticCurveTo(cx+w*0.42,cy+h*0.1,cx+w*0.08,cy-h*0.15);ctx.stroke();
  // tail
  ctx.beginPath();ctx.moveTo(cx-w*0.1,cy+h*0.36);ctx.lineTo(cx-w*0.28,cy+h*0.48);ctx.lineTo(cx+w*0.28,cy+h*0.48);ctx.lineTo(cx+w*0.1,cy+h*0.36);ctx.stroke();
  // eye
  ctx.setLineDash([]);ctx.beginPath();ctx.arc(cx+w*0.1,cy-h*0.1,4,0,Math.PI*2);ctx.fillStyle='rgba(0,100,200,0.5)';ctx.fill();
}
function drawSharkGuide(ctx,w,h){
  const cx=w*0.45,cy=h*0.52;
  // body
  ctx.beginPath();ctx.ellipse(cx,cy,w*0.42,h*0.2,-.1,0,Math.PI*2);ctx.fill();ctx.stroke();
  // dorsal fin
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(cx,cy-h*0.18);ctx.lineTo(cx+w*0.05,cy-h*0.42);ctx.lineTo(cx+w*0.18,cy-h*0.18);ctx.stroke();
  // tail
  ctx.beginPath();ctx.moveTo(cx-w*0.38,cy);ctx.lineTo(cx-w*0.5,cy-h*0.22);ctx.lineTo(cx-w*0.5,cy+h*0.22);ctx.closePath();ctx.stroke();
  // pectoral fin
  ctx.beginPath();ctx.moveTo(cx+w*0.05,cy);ctx.lineTo(cx+w*0.2,cy+h*0.25);ctx.lineTo(cx+w*0.22,cy);ctx.stroke();
  // eye
  ctx.setLineDash([]);ctx.beginPath();ctx.arc(cx+w*0.32,cy-h*0.04,4,0,Math.PI*2);ctx.fillStyle='rgba(0,100,200,0.5)';ctx.fill();
}
function drawEelGuide(ctx,w,h){
  ctx.beginPath();
  ctx.moveTo(w*0.12,h*0.5);
  ctx.bezierCurveTo(w*0.3,h*0.15,w*0.55,h*0.8,w*0.75,h*0.28);
  ctx.bezierCurveTo(w*0.85,h*0.1,w*0.9,h*0.4,w*0.88,h*0.5);
  ctx.lineWidth=22;ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(w*0.88,h*0.5,5,0,Math.PI*2);ctx.fillStyle='rgba(0,100,200,0.5)';ctx.fill();
}
function drawFlowerGuide(ctx,w,h){
  const cx=w/2,cy=h*0.45,pr=h*0.2;
  // petals
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    ctx.beginPath();ctx.ellipse(cx+pr*Math.cos(a),cy+pr*Math.sin(a),pr*0.35,pr*0.22,a,0,Math.PI*2);ctx.fill();ctx.stroke();
  }
  // center
  ctx.setLineDash([]);
  ctx.beginPath();ctx.arc(cx,cy,pr*0.3,0,Math.PI*2);ctx.fillStyle='rgba(255,200,0,0.3)';ctx.fill();ctx.stroke();
  // stem
  ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(cx,cy+pr);ctx.lineTo(cx,h*0.92);ctx.stroke();
}
function drawSeaweedGuide(ctx,w,h){
  const bx=w/2;
  ctx.setLineDash([]);ctx.lineWidth=3;
  for(let seg=0;seg<7;seg++){
    const y0=h*0.92-seg*(h/7.5);
    const y1=y0-h/7.5;
    const xo=(seg%2===0?1:-1)*(w*0.18);
    ctx.beginPath();ctx.moveTo(bx,y0);ctx.quadraticCurveTo(bx+xo,y0-h/15,bx,y1);ctx.stroke();
    // leaf
    ctx.beginPath();ctx.ellipse(bx+xo*0.7,y0-h/15,w*0.12,h*0.04,(seg%2===0?0.6:-0.6),0,Math.PI*2);ctx.fillStyle='rgba(0,180,80,0.2)';ctx.fill();ctx.stroke();
  }
}

// ═══════════════════════════════════════════════════
//  CROP CANVAS
// ═══════════════════════════════════════════════════
function cropCanvas(src){
  const imgD=src.getContext('2d').getImageData(0,0,src.width,src.height);
  const d=imgD.data;
  let minX=src.width,minY=src.height,maxX=0,maxY=0;
  for(let y=0;y<src.height;y++)for(let x=0;x<src.width;x++){
    if(d[(y*src.width+x)*4+3]>10){
      if(x<minX)minX=x;if(x>maxX)maxX=x;
      if(y<minY)minY=y;if(y>maxY)maxY=y;
    }
  }
  if(maxX<minX)return null;
  const pad=5;
  minX=Math.max(0,minX-pad);minY=Math.max(0,minY-pad);
  maxX=Math.min(src.width-1,maxX+pad);maxY=Math.min(src.height-1,maxY+pad);
  const cw=maxX-minX+1,ch=maxY-minY+1;
  const out=document.createElement('canvas');
  out.width=cw;out.height=ch;
  out.getContext('2d').drawImage(src,minX,minY,cw,ch,0,0,cw,ch);
  return out;
}

// ═══════════════════════════════════════════════════
//  RELEASE INTO TANK
// ═══════════════════════════════════════════════════
function release(){
  const imgData=dc.getImageData(0,0,drawCanvas.width,drawCanvas.height);
  const hasPixels=imgData.data.some((v,i)=>i%4===3&&v>10);
  if(!hasPixels){alert(releaseType==='plant'?'Draw a plant first! 🌿':'Draw a fish first! 🐟');return;}

  const cropped=cropCanvas(drawCanvas);
  if(!cropped)return;

  const maxDim=releaseType==='plant'?90:110;
  let fw=cropped.width,fh=cropped.height;
  const scale=Math.min(maxDim/fw,maxDim/fh,1);
  fw=Math.round(fw*scale);fh=Math.round(fh*scale);

  const fishCanvas=document.createElement('canvas');
  fishCanvas.width=fw;fishCanvas.height=fh;
  fishCanvas.getContext('2d').drawImage(cropped,0,0,fw,fh);

  const name=document.getElementById('fishName').value||'Unnamed';
  const id=editingId||`${Date.now()}_${Math.random().toString(36).slice(2)}`;

  if(releaseType==='plant'){
    // Plant: anchored at bottom
    const plantX=20+Math.random()*(aq.width-fw-40);
    const plantY=aq.height-fh-18;
    const plantObj={img:fishCanvas,x:plantX,y:plantY,w:fw,h:fh,name,id,sway:0,swaySpeed:.012+Math.random()*.01,swayAmp:3+Math.random()*4};
    if(editingId){
      const pi=plants.findIndex(p=>p.id===id);
      if(pi>-1)plants[pi]=plantObj; else plants.push(plantObj);
    } else { plants.push(plantObj); }
  } else {
    // Fish: swimming
    const angle=(Math.random()-.5)*.4;
    const spd=releaseSpeed;
    const fishObj={
      img:fishCanvas,
      x:Math.random()*(aq.width-fw-40)+20,
      y:Math.random()*(aq.height-fh-60)+20,
      vx:Math.cos(angle)*spd*(Math.random()<.5?1:-1),
      vy:Math.sin(angle)*spd*.4*(Math.random()<.5?1:-1),
      w:fw,h:fh,name,id,
      wobble:Math.random()*Math.PI*2,
      wobbleSpeed:.035+Math.random()*.025,
      wobbleAmp:.06+Math.random()*.07,
      turnTimer:80+Math.random()*180,
      speed:spd
    };
    if(editingId){
      const fi=fishes.findIndex(f=>f.id===id);
      if(fi>-1)fishes[fi]=fishObj; else fishes.push(fishObj);
    } else { fishes.push(fishObj); }
  }

  // Update or add gallery item
  if(editingId){
    updateGalleryItem(id,fishCanvas,name,releaseType);
    editingId=null;
    document.getElementById('editBanner').classList.remove('show');
    document.querySelectorAll('.gi-editing').forEach(el=>el.remove());
  } else {
    addGalleryItem(fishCanvas,name,id,releaseType);
  }

  clearCanvas();
  document.getElementById('fishName').value='';
  updateCount();
}

//  GALLERY
// ═══════════════════════════════════════════════════
function addGalleryItem(fishCanvas,name,id,type){
  document.getElementById('gallerySection').style.display='block';
  const gi=document.querySelector('.empty-msg');
  if(gi)gi.remove();

  const wrap=document.createElement('div');
  wrap.className='gi';wrap.dataset.id=id;

  const thumb=document.createElement('canvas');
  thumb.width=70;thumb.height=56;
  const tc=thumb.getContext('2d');
  const s=Math.min(70/fishCanvas.width,56/fishCanvas.height);
  const ox=(70-fishCanvas.width*s)/2,oy=(56-fishCanvas.height*s)/2;
  tc.drawImage(fishCanvas,ox,oy,fishCanvas.width*s,fishCanvas.height*s);
  wrap.appendChild(thumb);

  const nm=document.createElement('div');nm.className='gi-name';nm.textContent=name;wrap.appendChild(nm);

  const tag=document.createElement('div');tag.className=`gi-tag ${type}`;tag.textContent=type==='plant'?'🌿 Plant':'🐟 Fish';wrap.appendChild(tag);

  const acts=document.createElement('div');acts.className='gi-actions';
  const editBtn=document.createElement('button');editBtn.className='gi-btn edit';editBtn.textContent='✏️ Edit';
  editBtn.onclick=()=>startEdit(id);
  const delBtn=document.createElement('button');delBtn.className='gi-btn del';delBtn.textContent='✕ Del';
  delBtn.onclick=()=>removeFish(id);
  acts.appendChild(editBtn);acts.appendChild(delBtn);wrap.appendChild(acts);

  document.getElementById('galleryItems').appendChild(wrap);
  updateCount();
}

function updateGalleryItem(id,fishCanvas,name,type){
  const wrap=document.querySelector(`.gi[data-id="${id}"]`);
  if(!wrap)return;
  const thumb=wrap.querySelector('canvas');
  const tc=thumb.getContext('2d');
  tc.clearRect(0,0,70,56);
  const s=Math.min(70/fishCanvas.width,56/fishCanvas.height);
  const ox=(70-fishCanvas.width*s)/2,oy=(56-fishCanvas.height*s)/2;
  tc.drawImage(fishCanvas,ox,oy,fishCanvas.width*s,fishCanvas.height*s);
  wrap.querySelector('.gi-name').textContent=name;
  wrap.querySelector('.gi-tag').textContent=type==='plant'?'🌿 Plant':'🐟 Fish';
  wrap.querySelector('.gi-tag').className=`gi-tag ${type}`;
}

function startEdit(id){
  // Find fish or plant
  let obj=fishes.find(f=>f.id===id)||plants.find(p=>p.id===id);
  if(!obj)return;

  editingId=id;
  clearCanvas();
  // Draw onto draw canvas centered
  const cx=(drawCanvas.width-obj.w)/2;
  const cy=(drawCanvas.height-obj.h)/2;
  dc.drawImage(obj.img,cx,cy,obj.w,obj.h);

  document.getElementById('fishName').value=obj.name||'';
  const isPlant=!!plants.find(p=>p.id===id);
  setType(isPlant?'plant':'fish');
  if(!isPlant&&obj.speed){
    document.querySelectorAll('.speed-opt').forEach(o=>{
      o.classList.toggle('sel',parseFloat(o.dataset.speed)===obj.speed);
    });
    releaseSpeed=obj.speed;
  }

  document.getElementById('editBanner').classList.add('show');
  document.querySelectorAll('.gi-editing').forEach(el=>el.remove());
  const wrap=document.querySelector(`.gi[data-id="${id}"]`);
  if(wrap){const badge=document.createElement('div');badge.className='gi-editing';badge.textContent='Editing';wrap.appendChild(badge);}
  window.scrollTo({top:0,behavior:'smooth'});
}

function removeFish(id){
  fishes=fishes.filter(f=>f.id!==id);
  plants=plants.filter(p=>p.id!==id);
  const el=document.querySelector(`.gi[data-id="${id}"]`);
  if(el)el.remove();
  if(editingId===id){editingId=null;clearCanvas();document.getElementById('editBanner').classList.remove('show');}
  updateCount();
  const items=document.getElementById('galleryItems');
  if(!items.children.length)items.innerHTML='<span class="empty-msg">No fish yet — draw one!</span>';
  if(fishes.length===0&&plants.length===0)document.getElementById('gallerySection').style.display='none';
}

function clearTank(){fishes=[];plants=[];bubbles=[];document.getElementById('galleryItems').innerHTML='<span class="empty-msg">No fish yet — draw one!</span>';editingId=null;document.getElementById('editBanner').classList.remove('show');document.getElementById('gallerySection').style.display='none';updateCount();}

function updateCount(){document.getElementById('fishCount').textContent=`${fishes.length} fish + ${plants.length} plants in tank`;}

// Static seaweed / background plants (decorative)
const bgWeeds=Array.from({length:4},(_,i)=>({x:40+i*(aq.width/4.2),h:50+Math.random()*55,phase:Math.random()*Math.PI*2,segs:5+Math.floor(Math.random()*3),color:`hsl(${128+Math.random()*28},55%,${22+Math.random()*12}%)`}));

function drawBgWeed(w,t){
  ac.save();ac.strokeStyle=w.color;ac.lineWidth=4.5;ac.lineCap='round';
  const segH=w.h/w.segs;
  ac.beginPath();ac.moveTo(w.x,aq.height-14);
  for(let i=1;i<=w.segs;i++){
    const wave=Math.sin(t*.018+w.phase+i*.7)*7*(i/w.segs);
    ac.lineTo(w.x+wave,aq.height-14-i*segH);
  }
  ac.stroke();ac.restore();
}

// ═══════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════
function loop(){
  tick++;
  ac.clearRect(0,0,aq.width,aq.height);

  // Background
  const bgTop=nightMode?'#000510':'#001530';
  const bgBot=nightMode?'#000208':'#000f1f';
  const grad=ac.createLinearGradient(0,0,0,aq.height);
  grad.addColorStop(0,bgTop);grad.addColorStop(.7,'#001e40');grad.addColorStop(1,bgBot);
  ac.fillStyle=grad;ac.fillRect(0,0,aq.width,aq.height);

  // Stars in night mode
  if(nightMode){
    ac.save();
    for(let i=0;i<30;i++){
      const sx=(Math.sin(i*1234.5)*0.5+0.5)*aq.width;
      const sy=(Math.cos(i*4321.1)*0.5+0.5)*aq.height*0.5;
      ac.globalAlpha=.3+Math.sin(tick*.05+i)*.2;
      ac.fillStyle='#fff';
      ac.beginPath();ac.arc(sx,sy,1,0,Math.PI*2);ac.fill();
    }
    ac.restore();
  }

  // Light rays (day only)
  if(!nightMode){
    ac.save();ac.globalAlpha=.03+Math.sin(tick*.008)*.015;
    for(let i=0;i<5;i++){
      const rx=aq.width*.1+i*(aq.width/5);const rw=25+i*8;
      const rg=ac.createLinearGradient(rx,0,rx,aq.height*.65);
      rg.addColorStop(0,'rgba(120,200,255,.9)');rg.addColorStop(1,'rgba(120,200,255,0)');
      ac.fillStyle=rg;
      ac.beginPath();ac.moveTo(rx-rw/2,0);ac.lineTo(rx+rw/2,0);
      ac.lineTo(rx+rw*1.6,aq.height*.65);ac.lineTo(rx-rw*1.6,aq.height*.65);ac.fill();
    }
    ac.restore();
  }

  // Sand
  const sandG=ac.createLinearGradient(0,aq.height-20,0,aq.height);
  sandG.addColorStop(0,nightMode?'#160e04':'#2a1a08');sandG.addColorStop(1,nightMode?'#0a0804':'#1a0f04');
  ac.fillStyle=sandG;ac.fillRect(0,aq.height-18,aq.width,18);

  // Bg seaweed
  bgWeeds.forEach(w=>drawBgWeed(w,tick));

  // User plants (stationary, gentle sway)
  plants.forEach(p=>{
    p.sway+=p.swaySpeed;
    const sw=Math.sin(p.sway)*p.swayAmp;
    ac.save();
    ac.translate(p.x+p.w/2,p.y+p.h);
    ac.rotate(sw*Math.PI/180);
    ac.drawImage(p.img,-p.w/2,-p.h,p.w,p.h);
    ac.restore();
  });

  // Decos
  decos.forEach(d=>{
    ac.font='18px serif';ac.textAlign='center';ac.fillText(d.type,d.x,d.y);
  });

  // Bubbles
  if(showBubbles){
    spawnBubble();
    bubbles.forEach(b=>{
      b.y-=b.speed;b.wobble+=.05;b.x+=Math.sin(b.wobble)*.5;
      ac.save();ac.globalAlpha=b.op;
      ac.strokeStyle='rgba(150,220,255,.8)';ac.lineWidth=1.2;
      ac.beginPath();ac.arc(b.x,b.y,b.r,0,Math.PI*2);ac.stroke();
      ac.globalAlpha=b.op*.18;ac.fillStyle='rgba(200,240,255,1)';ac.fill();
      ac.restore();
    });
  }

  // Fish
  fishes.forEach(f=>{
    f.wobble+=f.wobbleSpeed;
    f.turnTimer--;
    if(f.turnTimer<=0){
      const da=(Math.random()-.5)*.55;
      const spd=Math.sqrt(f.vx*f.vx+f.vy*f.vy);
      const ang=Math.atan2(f.vy,f.vx)+da;
      f.vx=Math.cos(ang)*spd;f.vy=Math.sin(ang)*spd;
      f.turnTimer=70+Math.random()*200;
    }
    if(f.x<10)f.vx=Math.abs(f.vx);
    if(f.x+f.w>aq.width-10)f.vx=-Math.abs(f.vx);
    if(f.y<10)f.vy=Math.abs(f.vy);
    if(f.y+f.h>aq.height-28)f.vy=-Math.abs(f.vy);
    f.vy+=(Math.random()-.5)*.025;
    f.vy=Math.max(-2,Math.min(2,f.vy));
    f.x+=f.vx;f.y+=f.vy;

    const wb=Math.sin(f.wobble)*f.wobbleAmp;
    const left=f.vx<0;
    ac.save();
    ac.translate(f.x+f.w/2,f.y+f.h/2);
    if(left)ac.scale(-1,1);
    ac.rotate(wb);
    // shadow
    ac.save();ac.globalAlpha=.12;ac.filter='blur(3px)';
    ac.drawImage(f.img,-f.w/2+3,-f.h/2+3,f.w,f.h);ac.restore();
    ac.drawImage(f.img,-f.w/2,-f.h/2,f.w,f.h);
    // name tag
    if(f.name&&f.name!=='Unnamed'){
      ac.save();if(left)ac.scale(-1,1);
      ac.font='bold 9px sans-serif';ac.textAlign='center';
      ac.fillStyle='rgba(255,255,255,0.55)';
      ac.fillText(f.name,0,-f.h/2-4);
      ac.restore();
    }
    ac.restore();
  });

  // Aquarium border
  ac.save();
  const borderGlow=ac.createLinearGradient(0,0,aq.width,aq.height);
  borderGlow.addColorStop(0,'rgba(0,120,255,.25)');borderGlow.addColorStop(.5,'rgba(0,180,255,.1)');borderGlow.addColorStop(1,'rgba(0,120,255,.25)');
  ac.strokeStyle=borderGlow;ac.lineWidth=3;
  ac.strokeRect(1.5,1.5,aq.width-3,aq.height-3);
  ac.restore();

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
