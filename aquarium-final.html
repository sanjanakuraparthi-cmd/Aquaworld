<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <title>AquaWorld - Draw & Release Fish Together</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        html, body { width: 100%; height: 100%; -webkit-text-size-adjust: 100%; }
        :root {
            --bg: #06101c;
            --panel: #0b1828;
            --panel2: #0f2035;
            --border: #162a44;
            --accent: #0072ff;
            --green: #00aa55;
            --text: #e0e6f0;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            min-height: 100dvh;
            height: 100dvh;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        input, textarea, select { -webkit-user-select: text; user-select: text; }

        /* HEADER */
        .hlogo { font-size: 14px; font-weight: 800; background: linear-gradient(90deg, #00c6ff, #0072ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #hdr {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 8px 10px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            flex-wrap: wrap;
        }
        #welcome-status {
            display: none;
            padding: 9px 10px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.35;
            border: 1px solid var(--border);
            background: rgba(11, 24, 40, 0.95);
            color: var(--text);
        }
        #welcome-guide {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(15, 32, 53, 0.75);
            color: #9fb4d1;
            font-size: 11px;
            line-height: 1.45;
        }
        #room-code {
            background: var(--panel2);
            padding: 4px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            color: var(--accent);
            font-size: 11px;
        }
        #room-code:hover { background: var(--border); }
        #users { display: flex; gap: 3px; flex-wrap: wrap; }
        .user-avatar {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: bold;
        }

        /* MAIN LAYOUT */
        #container {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(300px, 340px);
            flex: 1;
            min-height: 0;
            gap: 0;
        }
        #mid {
            display: flex;
            flex-direction: column;
            background: var(--bg);
            min-width: 0;
            min-height: 0;
        }
        #aqC {
            flex: 1 1 auto;
            background: linear-gradient(180deg, #0a1f3f 0%, #051014 100%);
            display: block;
            cursor: crosshair;
            width: 100%;
            min-height: 0;
        }
        #bot {
            background: var(--panel);
            border-top: 1px solid var(--border);
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(260px, 0.85fr);
            min-height: 220px;
            max-height: 280px;
        }
        #gal {
            border-right: 1px solid var(--border);
            overflow: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(104px, 1fr));
            gap: 8px;
            padding: 8px;
            background: var(--panel2);
            align-content: start;
        }
        .f-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px;
            text-align: center;
            font-size: 10px;
            min-width: 0;
        }
        .f-card img { width: 100%; height: 58px; object-fit: contain; background: rgba(0,0,0,0.3); border-radius: 6px; }
        .f-card-name { margin: 4px 0 3px; font-weight: bold; color: #dff67f; font-size: 10px; }
        .f-card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-top: 5px; }
        .f-card-btns button { padding: 4px 3px; font-size: 9px; border: none; background: var(--accent); color: white; cursor: pointer; border-radius: 4px; }

        /* CHAT */
        #chat {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        #chat-msgs {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
            font-size: 10px;
            line-height: 1.3;
        }
        .chat-msg { margin: 2px 0; word-break: break-word; }
        .chat-msg strong { color: var(--accent); }
        #chat-input {
            display: flex;
            gap: 3px;
            padding: 6px;
            border-top: 1px solid var(--border);
        }
        #chat-input input {
            flex: 1;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 6px;
            border-radius: 3px;
            font-size: 10px;
            min-width: 80px;
        }
        #chat-input button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
        }

        /* RIGHT PANEL */
        #RP {
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 12px;
            z-index: 200;
            min-height: 0;
        }
        .rp-head {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        #RP h3 { font-size: 12px; margin-bottom: 6px; }
        .rp-head h3 {
            flex: 1;
            margin-bottom: 0;
        }
        .rp-close {
            display: none;
            align-items: center;
            justify-content: center;
            min-width: 38px;
            min-height: 38px;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        #drawer-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(1, 6, 12, 0.5);
            z-index: 140;
        }
        #mobile-menu-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(1, 6, 12, 0.56);
            z-index: 240;
        }
        #mobile-menu {
            display: none;
            position: fixed;
            right: 10px;
            top: 58px;
            width: min(300px, calc(100vw - 20px));
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            z-index: 260;
            box-shadow: 0 18px 38px rgba(0,0,0,0.5);
        }
        #mobile-menu.open {
            display: block;
        }
        .mobile-menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .mobile-menu-grid button,
        .mobile-menu-grid select,
        .mobile-menu-grid input {
            width: 100%;
        }
        .mobile-menu-wide {
            grid-column: 1 / -1;
        }
        #global-hub-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(1, 6, 12, 0.56);
            z-index: 2400;
        }
        #edit-banner {
            background: var(--accent);
            color: white;
            padding: 5px;
            border-radius: 3px;
            font-size: 10px;
            margin-bottom: 6px;
            display: none;
        }
        #tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-bottom: 6px;
        }
        .tool-btn {
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
            text-align: center;
            transition: all 0.2s;
        }
        .tool-btn:hover { background: var(--border); }
        .tool-btn:active { transform: scale(0.95); }
        .tool-btn.active { background: var(--accent); color: white; }

        /* SLIDERS & INPUTS */
        #brush-row {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
            align-items: center;
        }
        #brush-row input[type="range"] { flex: 1; height: 18px; }
        #brush-swatch {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            flex-shrink: 0;
        }
        #color-palette {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 3px;
            margin-bottom: 6px;
        }
        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .color-swatch:active { transform: scale(1.1); }
        .color-swatch.selected { outline: 2px solid white; outline-offset: 1px; }
        #custom-color {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
        }
        #custom-color input { flex: 1; height: 24px; cursor: pointer; }

        /* CANVAS */
        #drawwrap { display: block; position: relative; margin-bottom: 6px; width: 100%; }
        #drawC { display: block; cursor: crosshair; background: white; border: 1px solid var(--border); width: 100%; }
        #ovlC { position: absolute; top:0; left:0; pointer-events:none; display:none; }

        /* SETTINGS */
        #fish-settings {
            font-size: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        #fish-settings label { display: flex; gap: 4px; align-items: center; }
        #fish-settings input[type="text"] { flex: 1; background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 3px; border-radius: 2px; font-size: 10px; min-width: 60px; }
        #fish-settings select { flex: 1; background: var(--panel2); border: 1px solid var(--border); color: var(--text); padding: 3px; border-radius: 2px; font-size: 10px; }
        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            margin-top: 6px;
        }
        .action-btns button {
            background: var(--green);
            color: white;
            border: none;
            padding: 6px 4px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.2s;
        }
        .action-btns button:active { transform: scale(0.95); }
        .action-btns button.danger { background: #cc3333; }

        /* WELCOME SCREEN */
        #notify {
            position: fixed;
            top: 64px;
            left: 50%;
            right: auto;
            display: none;
            background: var(--panel);
            border: 1px solid var(--accent);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 10px;
            width: fit-content;
            min-width: min(240px, calc(100vw - 24px));
            max-width: min(460px, calc(100vw - 24px));
            z-index: 5000;
            pointer-events: none;
            text-align: center;
            transform: translateX(-50%);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(-50%) translateY(-12px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        #welcome {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 15px;
            padding: 20px;
            overflow-y: auto;
        }
        #welcome h1 { color: var(--accent); font-size: 24px; margin-bottom: 10px; }
        #welcome input { padding: 8px; border: 1px solid var(--accent); background: var(--panel); color: var(--text); border-radius: 3px; font-size: 14px; width: 100%; max-width: 280px; }
        #welcome button { padding: 10px 20px; border: none; border-radius: 3px; cursor: pointer; font-size: 14px; width: 100%; max-width: 280px; }
        .btn-primary { background: var(--green); color: white; }
        .btn-secondary { background: var(--accent); color: white; }

        /* HEADER BUTTONS */
        #hdr button, #hdr select {
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 8px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            white-space: nowrap;
        }
        #hdr button:active { transform: scale(0.95); }

        /* RESPONSIVE - MOBILE */
        @media (max-width: 768px) {
            body { overflow-x: hidden; overflow-y: auto; }
            #hdr {
                padding: 6px;
                font-size: 11px;
                gap: 6px;
            }
            #users {
                max-width: 96px;
                overflow: hidden;
            }
            .mobile-secondary {
                display: none !important;
            }
            #container {
                grid-template-columns: 1fr;
            }
            #bot {
                min-height: 180px;
                max-height: none;
                grid-template-columns: 1fr;
            }
            #gal {
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 180px;
            }
            #chat {
                min-width: 0;
            }
            #RP {
                display: none;
                position: fixed;
                right: 0;
                top: 56px;
                bottom: 0;
                width: min(360px, 92vw);
                max-width: 80vw;
                border-left: 1px solid var(--border);
                border-radius: 0;
                z-index: 150;
                transform: translateX(100%);
                transition: transform 0.3s ease;
            }
            #RP.open {
                display: flex;
                transform: translateX(0);
                box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            }
            .rp-close {
                display: inline-flex;
            }
            #drawer-backdrop.open {
                display: block;
            }
            #mobile-menu-backdrop.open {
                display: block;
            }
            #global-hub-backdrop.open {
                display: block;
            }
            .menu-toggle {
                display: block !important;
            }
            #welcome input,
            #chat-input input,
            #fish-settings input[type="text"],
            #fish-settings select,
            #hdr select {
                font-size: 16px !important;
            }
        }

        /* RESPONSIVE - SMALL MOBILE */
        @media (max-width: 480px) {
            #hdr {
                padding: 5px;
                font-size: 10px;
                gap: 4px;
            }
            .hlogo { font-size: 12px; }
            #room-code { font-size: 10px; padding: 2px 4px; }
            #hdr button, #hdr select { padding: 3px 6px; font-size: 10px; }
            #chat-input { padding: 4px; gap: 2px; }
            #chat-input input, #chat-input button { font-size: 10px; }
            #RP {
                width: 100%;
                max-width: 100vw;
            }
            #mobile-menu {
                left: 10px;
                right: 10px;
                width: auto;
                top: auto;
                bottom: calc(12px + env(safe-area-inset-bottom));
            }
            #global-hub {
                left: 0 !important;
                right: 0 !important;
                top: auto !important;
                bottom: 0 !important;
                width: 100vw !important;
                max-height: min(78vh, 560px) !important;
                border-radius: 18px 18px 0 0 !important;
                padding: 14px 14px calc(14px + env(safe-area-inset-bottom)) !important;
                box-shadow: 0 -16px 36px rgba(0,0,0,0.5) !important;
            }
            .f-card { font-size: 9px; }
            .f-card img { height: 48px; }
        }

        /* LANDSCAPE MODE */
        @media (max-height: 500px) {
            #bot { min-height: 70px; }
            #gal { height: 50px; }
            #chat-msgs { font-size: 9px; padding: 4px; }
            #chat-msg { margin: 1px 0; }
        }

        /* TABLET */
        @media (min-width: 769px) and (max-width: 1024px) {
            #RP { max-width: 260px; }
            #tool-grid { grid-template-columns: 1fr 1fr; }
        }

        /* HIDE/SHOW ELEMENTS */
        .menu-toggle { display: none; }

        /* TOUCH IMPROVEMENTS */
        @media (hover: none) and (pointer: coarse) {
            button, input[type="button"], select { min-height: 44px; }
            .tool-btn { padding: 8px; }
            #hdr button { min-height: 38px; }
        }
    </style>
</head>
<body>

<div id="hdr">
    <span class="hlogo">🐠 AquaWorld</span>
    <div id="room-pill" onclick="copyRoomCode()" title="Copy room code" style="cursor:pointer;background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:2px 6px;font-size:10px;display:flex;align-items:center;gap:4px;">
      <span id="room-code" style="color:#aaccff;letter-spacing:.05em;font-family:monospace;">———</span>
      <span id="conn-status" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff4444;" title="Disconnected"></span>
    </div>
    <button onclick="copyInviteLink()" title="Copy invite link">🔗</button>
    <div id="users"></div>
    <div style="flex:1;"></div>
    <select id="theme-select" class="mobile-secondary" onchange="setTheme(this.value)"><option value="Ocean">🌊</option><option value="Tropical">🌺</option><option value="DeepSea">🌑</option><option value="Sunset">🌅</option></select>
    <button class="mobile-secondary" onclick="emptyTank()">🧹</button>
    <button id="theme-btn" class="mobile-secondary" onclick="toggleNight()">🌙</button>
    <button id="sound-btn" class="mobile-secondary" onclick="toggleSound()">🔊</button>
    <input class="mobile-secondary volume-slider" type="range" min="0" max="1" step="0.05" value="0.5" oninput="setVolume(this.value)" title="Volume" style="width:55px;">
    <button onclick="openLeaderboard('contest')" title="Global contest">🏆</button>
    <button id="feed-btn" class="mobile-secondary" onclick="toggleFeedMode()" title="Feed mode">🍤</button>
    <button class="mobile-secondary" onclick="showMyCreatures()" title="My creatures">🗂️</button>
    <button class="mobile-secondary" onclick="screenshotAquarium()" title="Screenshot">📸</button>
    <button class="mobile-secondary" onclick="showAchievements()" title="Achievements">🏅</button>
    <span id="coin-display" class="coin-display mobile-secondary" style="font-size:11px;color:#FFD700;">🪙 0</span>
    <button id="more-toggle" class="menu-toggle" onclick="toggleMobileMenu()">⋯</button>
    <button id="draw-toggle" class="menu-toggle" onclick="toggleDrawPanel()">✏️</button>
</div>

<div id="welcome">
    <div style="text-align:center;margin-bottom:10px;">
        <div style="font-size:40px;">🐠</div>
        <h1>AquaWorld</h1>
        <p style="color:#556;font-size:11px;">Draw, release, swim together!</p>
    </div>
    <div style="background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:15px;width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px;">
        <div>
            <label style="display:block;font-size:10px;color:#aaa;margin-bottom:4px;text-transform:uppercase;">Name</label>
            <input id="name-input" type="text" placeholder="Your name" spellcheck="false" autocapitalize="words" autocorrect="off" style="width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:4px;font-size:13px;-webkit-user-select:text;user-select:text;pointer-events:auto;" onkeydown="if(event.key==='Enter'){ const code=document.getElementById('room-input').value.trim(); if(linkedRoomCode) joinLinkedRoom(); else if(code) joinRoom(); }">
        </div>
        <div>
            <label style="display:block;font-size:10px;color:#aaa;margin-bottom:4px;text-transform:uppercase;">Color</label>
            <div id="color-picker" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
            <button id="create-room-btn" data-welcome-action="1" class="btn-primary" onclick="createRoom()">🌊 New</button>
            <button id="public-room-btn" data-welcome-action="1" class="btn-secondary" onclick="joinPublicOcean()">🌍 Public Ocean</button>
        </div>
        <button id="join-linked-btn" data-welcome-action="1" class="btn-secondary" onclick="joinLinkedRoom()" style="display:none;max-width:none;">🔗 Join Shared Room</button>
        <button id="rejoin-btn" data-welcome-action="1" class="btn-secondary" onclick="rejoinLastRoom()" style="display:none;max-width:none;">↩️ Rejoin Room</button>
        <div id="join-prompt" style="display:block;">
            <label style="display:block;font-size:10px;color:#aaa;margin-bottom:4px;">Code or invite link</label>
            <div style="display:flex;gap:4px;">
                <input id="room-input" type="text" placeholder="abc123 or pasted link" spellcheck="false" autocapitalize="none" autocorrect="off" style="flex:1;background:var(--bg);border:1px solid var(--accent);color:var(--text);padding:8px;border-radius:4px;font-size:13px;-webkit-user-select:text;user-select:text;pointer-events:auto;" onkeydown="if(event.key==='Enter')joinRoom()">
                <button id="paste-room-btn" data-welcome-action="1" class="btn-secondary" onclick="pasteRoomCode()" style="padding:8px 10px;">Paste</button>
                <button id="join-room-btn" data-welcome-action="1" class="btn-secondary" onclick="joinRoom()" style="padding:8px 12px;">Go</button>
            </div>
        </div>
        <div id="welcome-status" aria-live="polite"></div>
        <div id="welcome-guide">
            <strong style="color:#fff;">How to play</strong><br>
            <span>🌍 Public Ocean = one big shared tank for everyone</span><br>
            <span>🔒 New = make a private room for friends</span><br>
            <span>🏆 Contest = likes and rankings across all rooms</span>
        </div>
    </div>
    <p style="color:#334;font-size:9px;max-width:300px;">Share code with friends - see fish instantly!</p>
</div>

<div id="container" style="display:none;">
    <div id="mid">
        <canvas id="aqC"></canvas>
        <div id="bot">
            <div id="gal"></div>
            <div id="chat">
                <div id="chat-msgs"></div>
                <div id="quick-chat" style="display:flex;gap:3px;padding:2px 4px;flex-wrap:wrap;">
                    <button onclick="quickChat('👋 Hi!')" style="font-size:10px;padding:2px 6px;">👋</button>
                    <button onclick="quickChat('🐟 Nice fish!')" style="font-size:10px;padding:2px 6px;">🐟</button>
                    <button onclick="quickChat('😮 Wow!')" style="font-size:10px;padding:2px 6px;">😮</button>
                    <button onclick="quickChat('❤️')" style="font-size:10px;padding:2px 6px;">❤️</button>
                    <button onclick="quickChat('🫧 Feed them!')" style="font-size:10px;padding:2px 6px;">🫧</button>

<script>
'use strict';

// Audio system
let audioEnabled = true;
let ambientNodes = null;
function initAudio() {
    try {
        window.audioContext = window.audioContext || new (window.AudioContext || window.webkitAudioContext)();
        document.addEventListener('pointerdown', resumeAudio, { passive: true });
        document.addEventListener('keydown', resumeAudio, { passive: true });
    }
    catch(e) { console.log('Audio not available'); }
}
function resumeAudio() {
    if (!window.audioContext) return;
    if (window.audioContext.state === 'suspended') {
        window.audioContext.resume().catch(() => {});
    }
    updateAmbientSound();
}
function stopAmbientSound() {
    if (!ambientNodes) return;
    try {
        ambientNodes.master.gain.cancelScheduledValues(window.audioContext.currentTime);
        ambientNodes.master.gain.setTargetAtTime(0.0001, window.audioContext.currentTime, 0.15);
        setTimeout(() => {
            try {
                ambientNodes.osc1.stop();
                ambientNodes.osc2.stop();
                ambientNodes.lfo.stop();
            } catch (e) {}
            ambientNodes.master.disconnect();
            ambientNodes.lfoGain.disconnect();
            ambientNodes = null;
        }, 400);
    } catch (e) {
        ambientNodes = null;
    }
}
function updateAmbientSound() {
    if (!window.audioContext || !audioEnabled || volume <= 0) return stopAmbientSound();
    const ctx = window.audioContext;
    if (ctx.state !== 'running') return;
    if (!ambientNodes) {
        const master = ctx.createGain();
        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const lfo = ctx.createOscillator();
        const lfoGain = ctx.createGain();
        master.gain.value = Math.max(0.0001, volume * 0.03);
        osc1.type = 'sine';
        osc2.type = 'triangle';
        osc1.frequency.value = 132;
        osc2.frequency.value = 198;
        lfo.type = 'sine';
        lfo.frequency.value = 0.11;
        lfoGain.gain.value = 8;
        lfo.connect(lfoGain);
        lfoGain.connect(osc1.frequency);
        lfoGain.connect(osc2.frequency);
        osc1.connect(master);
        osc2.connect(master);
        master.connect(ctx.destination);
        osc1.start();
        osc2.start();
        lfo.start();
        ambientNodes = { master, osc1, osc2, lfo, lfoGain };
    }
    ambientNodes.master.gain.setTargetAtTime(Math.max(0.0001, volume * 0.03), ctx.currentTime, 0.2);
}
function playSound(type) {
    if (!audioEnabled || !window.audioContext) return;
    try {
        resumeAudio();
        const ctx = window.audioContext;
        const now = ctx.currentTime;
        if (ctx.state !== 'running') return;
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        const v = volume * 0.2;
        const freqMap = { release:[500,200,0.25], click:[700,600,0.08], chat:[800,1000,0.12], bubble:[400,600,0.15], achievement:[600,1200,0.4] };
        const [f1,f2,dur] = freqMap[type] || freqMap.click;
        osc.frequency.setValueAtTime(f1, now);
        osc.frequency.exponentialRampToValueAtTime(f2, now + dur);
        gain.gain.setValueAtTime(v, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
        osc.start(now); osc.stop(now + dur);
    } catch(e) {}
}
function setVolume(v) {
    volume = parseFloat(v);
    localStorage.setItem('aqVolume', v);
    updateAmbientSound();
    syncControlStates();
}
function unlockAch(key) {
    if (achievements[key]) return;
    achievements[key] = true;
    const a = ACHIEVEMENTS[key];
    notify(`${a.emoji} Achievement: ${a.name}`, '#FFD700');
    playSound('achievement');
    coins += 50; updateCoins();
    localStorage.setItem('aqAchievements', JSON.stringify(achievements));
    localStorage.setItem('aqCoins', coins);
}
function updateCoins() {

        el.textContent = `🪙 ${coins}`;
    });
}

}

    audioEnabled = !audioEnabled;
    if (audioEnabled) resumeAudio(); else stopAmbientSound();

function dropFood(x, y, pelletId = null) {
    for (let i = 0; i < 7; i++) {
        foodPellets.push({
            id: pelletId ? `${pelletId}_${i}` : `pellet_${rnd6()}_${i}`,
            x: x + (Math.random() - 0.5) * 20,

    playSound('bubble');
}
function contestTimeRemaining() {
    const endsAt = globalContestState?.contest?.ends_at ? Date.parse(globalContestState.contest.ends_at) : 0;
    const remaining = Math.max(0, (endsAt || 0) - Date.now());
    const hours = Math.floor(remaining / 3600000);
    const mins = Math.floor((remaining % 3600000) / 60000);
    if (!endsAt) return 'Syncing...';
    return `${hours}h ${String(mins).padStart(2, '0')}m`;
}
function removeContestByFishId(fishId) {
    const fish = findFishById(fishId);
    if (!fish) return;

    fish.contestEntryId = null;

async function submitFishGlobal(id) {
    const fish = findFishById(id);
    if (!fish) return;
    if (fish.kind !== 'Fish') return notify('Only fish can join the contest.', '#ff6666');
    if (fish.ownerId && fish.ownerId !== myId) return notify('Only the fish owner can submit this fish.', '#ff6666');
    try {
        const data = await apiFetch('/api/global/submit', {
            method: 'POST',
            body: JSON.stringify({
                submission_id: fish.contestEntryId || undefined,
                client_id: myId,
                room_code: roomCode,
                owner_id: fish.ownerId,
                owner_name: (users[fish.ownerId] || {}).name || myName,
                owner_color: (users[fish.ownerId] || {}).color || myColor,
                fish
            })
        });
        if (data.entry) {
            fish.inContest = true;
            fish.contestEntryId = data.entry.submission_id;
            fish.globalLikes = data.entry.likes || 0;
        }
        unlockAch('contest_star');
        await loadGlobalContestState(true);
        saveStorage();
        rebuildGal();
        if (document.getElementById('global-hub')) renderGlobalHub();
        notify(`🏆 ${fish.name} entered the global contest`, '#00c6ff');
    } catch (err) {
        notify(`Contest unavailable: ${err.message}`, '#ff6666');
    }
}
async function likeGlobalFish(submissionId) {
    if (!submissionId) return;
    const entry = (globalContestState.leaderboard || []).find(item => item.submission_id === submissionId);
    if (!entry) return notify('Contest fish not found', '#ff6666');
    if (entry.owner_client_id === myId) return notify('You cannot like your own fish', '#ff6666');
    try {
        const data = await apiFetch('/api/global/like', {
            method: 'POST',
            body: JSON.stringify({ submission_id: submissionId, voter_id: myId })
        });
        await loadGlobalContestState(true);
        if (document.getElementById('global-hub')) renderGlobalHub();
        notify(data.liked ? '❤️ Like added' : '💔 Like removed', '#ff6fa8');
    } catch (err) {
        notify(`Could not update like: ${err.message}`, '#ff6666');
    }
}
function buildGlobalEntry(entry, rank) {
    const safeFish = escapeHtml(entry.fish_name || 'Fish');
    const safeOwner = escapeHtml(entry.owner_name || 'Aquarist');

    return `
        <div style="display:flex;gap:8px;padding:8px;background:var(--panel2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;">
            <div style="width:34px;height:44px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:${rank === 1 ? '#ffd166' : rank === 2 ? '#cfd8dc' : rank === 3 ? '#f4a261' : '#7fa6d6'};">#${rank}</div>
            <img src="${entry.image}" alt="${safeFish}" style="width:58px;height:44px;object-fit:contain;background:rgba(0,0,0,0.2);border-radius:6px;">
            <div style="flex:1;min-width:0;">
                <div style="font-size:12px;font-weight:bold;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${safeFish}</div>
                <div style="font-size:10px;color:${entry.rarity_color || '#9fb4d1'};">${safeRarity} · ${safePersonality}</div>

}

        : (sortedContestEntries

        ${contestList}

function rnd6() { return Math.random().toString(36).substr(2,6); }
function findFishById(id) {
    return [...fishes, ...plants].find(f => f.id === id);

function normalizeRoomCode(raw) {
    const text = String(raw || '').trim();
    if (!text) return '';
    try {
        const url = new URL(text);
        const code = url.searchParams.get('room');
        if (code) return code.trim().toLowerCase();
    } catch (e) {}
    const fromQuery = text.match(/[?&]room=([A-Za-z0-9_-]+)/i);
    if (fromQuery) return fromQuery[1].toLowerCase();
    const clean = text.replace(/[^A-Za-z0-9_-]/g, '');
    return clean.toLowerCase();
}
async function previewModeration(kind, text, defaultText = '') {
    const fallbackText = String(text ?? '');
    const fallbackDefault = String(defaultText ?? '');
    if (!API_BASE && location.protocol === 'file:') {
        return {
            kind,
            original: fallbackText,
            cleaned: kind === 'chat' ? fallbackText.trim().slice(0, 100) : (fallbackText.trim().slice(0, 40) || fallbackDefault || 'Aquarist'),
            moderated: false,
            blocked: false
        };
    }
    try {
        return await apiFetch('/api/moderate/preview', {
            method: 'POST',
            body: JSON.stringify({
                kind,
                text: fallbackText,
                default_text: fallbackDefault
            })
        });
    } catch (err) {
        return {
            kind,
            original: fallbackText,
            cleaned: kind === 'chat' ? fallbackText.trim().slice(0, 100) : (fallbackText.trim().slice(0, 40) || fallbackDefault || 'Aquarist'),
            moderated: false,
            blocked: false
        };
    }
}
function sanitizePlayerName(value) {
    return String(value || '').trim().slice(0, 40) || 'Aquarist';
}
function moderateChatText(value) {
    return String(value || '').trim().slice(0, 100);
}
function uniqueFishName(baseName, excludeId = '') {
    const base = String(baseName || '').trim().slice(0, 40) || randName();
    const used = new Set(
        [...fishes, ...plants]
            .filter(f => f.id !== excludeId)
            .map(f => String(f.name || '').trim().toLowerCase())
            .filter(Boolean)
    );
    if (!used.has(base.toLowerCase())) return base;
    let suffix = 2;
    let candidate = `${base} ${suffix}`;
    while (used.has(candidate.toLowerCase())) {
        suffix += 1;
        candidate = `${base} ${suffix}`;
    }
    return candidate.slice(0, 40);
}
async function prepareFishName(value, excludeId = '') {
    const original = String(value || '').trim();
    let base = original;
    let reason = '';
    if (!base || /^fish$/i.test(base)) {
        base = randName();
        reason = 'auto';
    }
    const preview = await previewModeration('name', base, randName());
    if (preview.cleaned && preview.cleaned !== base) {
        base = preview.cleaned;
        reason = 'moderated';
    }
    const unique = uniqueFishName(base, excludeId);
    if (!reason && unique !== base) reason = 'duplicate';
    return { name: unique, reason, original };
}
function normalizeCreatureTemplate(raw) {

function bindOutsideClose(panel, onClose) {

    }
    const cleanup = () => {
        document.removeEventListener('pointerdown', onPointerDown, true);
        document.removeEventListener('keydown', onKeyDown, true);
        panel._outsideCleanup = null;
    };
    function onPointerDown(event) {
        if (!panel.isConnected) return cleanup();
        if (panel.contains(event.target)) return;
        cleanup();
        onClose();
    }
    function onKeyDown(event) {
        if (event.key !== 'Escape') return;
        cleanup();
        onClose();
    }
    panel._outsideCleanup = cleanup;
    setTimeout(() => {
        if (!panel.isConnected) return;
        document.addEventListener('pointerdown', onPointerDown, true);
        document.addEventListener('keydown', onKeyDown, true);
    }, 0);
}

function applyCanvasImage(src) {

function drawStrokeSegment(ctx, canvas, x1, y1, x2, y2, opts = {}) {
    if (!ctx || !canvas) return;
    const size = Math.max(1, opts.size || brushSize);
    const alpha = opts.opacity ?? 1;
    const toolName = opts.tool || 'pen';
    const drawLine = (ax1, ay1, ax2, ay2) => {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        if (toolName === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.strokeStyle = 'rgba(0,0,0,1)';
            ctx.lineWidth = size * 3;
        } else {
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = opts.color || brushColor;
            ctx.lineWidth = size;
        }
        ctx.beginPath();
        ctx.moveTo(ax1, ay1);
        ctx.lineTo(ax2, ay2);
        ctx.stroke();
        ctx.restore();
    };
    drawLine(x1, y1, x2, y2);
    if (opts.mirror) {
        drawLine(canvas.width - x1, y1, canvas.width - x2, y2);
    }
}
function sprayStroke(ctx, canvas, cx, cy, opts = {}) {
    if (!ctx || !canvas) return;
    const size = Math.max(1, opts.size || brushSize);
    const alpha = opts.opacity ?? 1;
    const radius = size * 7 + 5;
    const density = Math.ceil(size * 2.5 + 8);
    const scatter = (baseX) => {
        ctx.save();
        ctx.globalAlpha = alpha * 0.7;
        ctx.fillStyle = opts.color || brushColor;
        for (let i = 0; i < density; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * radius;
            const px = baseX + Math.cos(angle) * dist;
            const py = cy + Math.sin(angle) * dist;
            ctx.beginPath();
            ctx.arc(px, py, Math.random() * 1.2 + 0.3, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    };
    scatter(cx);
    if (opts.mirror) scatter(canvas.width - cx);
}

function formatBornAt(timestamp) {
    if (!timestamp) return 'Just now';
    try {
        return new Date(timestamp).toLocaleString([], {
            month: 'short',
            day: 'numeric',
            hour: 'numeric',
            minute: '2-digit'
        });
    } catch (e) {
        return 'Just now';
    }
}
function formatFishAge(timestamp) {
    if (!timestamp) return 'Freshly released';
    const diff = Math.max(0, Date.now() - timestamp);
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m old`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}h ${mins % 60}m old`;
    const days = Math.floor(hours / 24);
    return `${days}d ${hours % 24}h old`;
}

function updateRoomMeta(nextMeta, silent = false) {
    if (!nextMeta) return;
    const previousActingOwner = roomMeta?.acting_owner_id || null;
    roomMeta = nextMeta;
    roomCode = String(roomMeta.room_code || roomCode || '').toUpperCase();
    saveLastRoomCode(roomCode);
    const wasHost = isHost;
    isHost = roomMeta.acting_owner_id === myId;
    updateHdr();
    if (!silent && previousActingOwner && previousActingOwner !== roomMeta.acting_owner_id) {
        if (isHost && !wasHost) notify('👑 You are now leading the room.', '#ffd166');
        else if (users[roomMeta.acting_owner_id]) notify(`👑 ${users[roomMeta.acting_owner_id].name} is now leading the room.`, '#ffd166');
    }
}

function bootstrapRoomSession(data) {
    roomLastEventId = data.last_event_id || 0;
    updateRoomMeta(data.room, true);
    applyRoomSnapshot(data.state || {});
    applyRoomMembers(data.members || []);
    updateRoomMeta(data.room, true);
    updateConnStatus('connected');
}

async function pollRoomSync(showErrors = false) {
    if (roomSyncBusy || !roomCode || !myId) return;
    roomSyncBusy = true;
    try {
        const data = await apiFetch(`/api/rooms/sync?room_code=${encodeURIComponent(roomCode)}&client_id=${encodeURIComponent(myId)}&last_event_id=${encodeURIComponent(roomLastEventId)}`);
        const events = Array.isArray(data.events) ? data.events : [];
        events.forEach(evt => {
            roomLastEventId = Math.max(roomLastEventId, evt.event_id || 0);
            handleMsg(evt.message, evt.sender_id);
        });
        roomLastEventId = Math.max(roomLastEventId, data.last_event_id || 0);
        if (data.state) applyRoomSnapshot(data.state);
        applyRoomMembers(data.members || []);
        updateRoomMeta(data.room);
        updateConnStatus('connected');
    } catch (err) {
        updateConnStatus(showErrors ? 'offline' : 'reconnecting');
        if (showErrors) notify(`Could not sync room: ${err.message}`, '#ff6666');
    } finally {
        roomSyncBusy = false;
    }
}

function startRoomPolling() {
    clearInterval(roomSyncTimer);
    pollRoomSync(false);
    roomSyncTimer = setInterval(() => { pollRoomSync(false); }, 900);
}

async function postRoomEvent(msg, quiet = true) {
    if (!roomCode || !myId) return;
    try {
        const data = await apiFetch('/api/rooms/event', {
            method: 'POST',
            body: JSON.stringify({
                room_code: roomCode,
                client_id: myId,
                name: myName,
                color: myColor,
                message: msg
            })
        });
        roomLastEventId = Math.max(roomLastEventId, data.event_id || 0);
        if (data.room) updateRoomMeta(data.room, true);
        updateConnStatus('connected');
    } catch (err) {
        updateConnStatus('reconnecting');
        if (!quiet) notify(`Could not update room: ${err.message}`, '#ff6666');
    }
}

    clearInterval(roomSyncTimer);
    const body = JSON.stringify({ room_code: roomCode, client_id: myId });
    try {
        if (navigator.sendBeacon) {
            navigator.sendBeacon(apiUrl('/api/rooms/leave'), new Blob([body], { type: 'application/json' }));
        } else {
            fetch(apiUrl('/api/rooms/leave'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body,
                keepalive: true
            }).catch(() => {});
        }
    } catch (e) {}
}

    drawC.addEventListener('touchend', e => { e.preventDefault(); onUp(e.changedTouches[0]); }, { passive: false });

        if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undoStroke(); }
        if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { e.preventDefault(); redoStroke(); }
    });

    coins = parseInt(localStorage.getItem('aqCoins') || '0');
    achievements = JSON.parse(localStorage.getItem('aqAchievements') || '{}');
    volume = parseFloat(localStorage.getItem('aqVolume') || '0.5');

    users = {};
    foodPellets = [];
    contestEntries = [];

function buildToolGrid() {
    const tools = [

function handleMsg(d, from) {
    if (!d.type) return;
    const sender = from;
    if (d.type === 'USER_JOIN') {
        if (!users[d.id]) notify(`👋 ${d.name} joined`, d.color || '#9fb4d1');
        users[d.id] = { id: d.id, name: d.name, color: d.color || '#9fb4d1' };
        updateHdr();
        playSound('bubble');
    } else if (d.type === 'USER_LEFT') {
        notify(`👋 ${d.name || users[d.id]?.name || 'Someone'} left`, '#888');
        delete users[d.id];
        updateHdr();
    } else if (d.type === 'INIT') {
        fishes = d.fishes || [];
        plants = d.plants || [];
        foodPellets = Array.isArray(d.foodPellets) ? d.foodPellets : [];
        currentTheme = d.theme || 'Ocean'; nightMode = d.night || false;
        rebuildGal(); updateHdr(); setTheme(currentTheme, false);
        if (nightMode) updateNightMode();
        syncControlStates();
        if (d.draft !== undefined) applyCanvasImage(d.draft);
        loadGlobalContestState(true);
    } else if (d.type === 'FISH_ADD') {
        if (!d.fish || d.fish.ownerId !== sender) return;
        fishes = fishes.filter(f => f.id !== d.fish.id);
        plants = plants.filter(f => f.id !== d.fish.id);
        if (d.kind === 'Fish') fishes.push(d.fish); else plants.push(d.fish);
        rebuildGal(); saveStorage(); loadGlobalContestState(true);
    } else if (d.type === 'FISH_DEL') {
        if (!canMutateFishFromSender(sender, d.id)) return;
        fishes = fishes.filter(f => f.id !== d.id); plants = plants.filter(f => f.id !== d.id);
        removeContestByFishId(d.id);
        rebuildGal(); saveStorage(); loadGlobalContestState(true);
    } else if (d.type === 'FISH_EDIT') {
        if (!d.fish || !canMutateFishFromSender(sender, d.id, d.fish)) return;
        const f = d.fish; fishes = fishes.filter(x => x.id !== d.id); plants = plants.filter(x => x.id !== d.id);
        if (f.kind === 'Fish') fishes.push(f); else plants.push(f);
        delete imgCache[f.img]; rebuildGal(); saveStorage(); loadGlobalContestState(true);
    } else if (d.type === 'CHAT') {
        if (sender === myId) return;
        appendChat(d.name, d.color, d.text);
        // Show speech bubble above a fish owned by sender
        const ownerFish = fishes.find(f => f.ownerId === sender);
        if (ownerFish) { ownerFish.speech = d.text; ownerFish.speechExpires = Date.now() + 4000; }
        playSound('chat');
    } else if (d.type === 'DRAW_SEG') {
        drawStrokeSegment(dc, drawC, d.x1, d.y1, d.x2, d.y2, d);
    } else if (d.type === 'DRAW_FILL') {
        floodFill(d.x, d.y, d.color, dc, drawC);
    } else if (d.type === 'DRAW_SPRAY') {
        sprayStroke(dc, drawC, d.x, d.y, d);
    } else if (d.type === 'DRAW_SNAPSHOT') {
        applyCanvasImage(d.image);
    } else if (d.type === 'DRAW_CLEAR') {
        dc.clearRect(0, 0, drawC.width, drawC.height);
    } else if (d.type === 'FOOD_DROP') {
        dropFood(d.x, d.y, d.pelletId || null);
    } else if (d.type === 'FOOD_EAT') {
        foodPellets = foodPellets.filter(pellet => pellet.id !== d.pelletId);
        const fish = findFishById(d.fishId);
        if (fish) {
            fish.foodScore = Math.max(fish.foodScore || 0, d.foodScore || 0);
            syncFeedState(fish, true);
        }
    } else if (d.type === 'FISH_FEED_STATE') {
        const fish = findFishById(d.id);
        if (fish && d.fish && d.fish.ownerId === sender) {
            fish.foodScore = Math.max(fish.foodScore || 0, d.fish.foodScore || 0);
            syncFeedState(fish, true);
        }
    } else if (d.type === 'THEME') {
        setTheme(d.theme, false);
    } else if (d.type === 'NIGHT') {
        nightMode = !!d.night;
        updateNightMode();
        syncControlStates();
    }
}

let lastX = 0, lastY = 0, startX = 0, startY = 0;

function onDown(e) {
    resumeAudio();
    const pos = getPos(e);
    if (!pos) return;
    if (tool === 'eye') {
        const px = Math.max(0, Math.min(drawC.width - 1, ~~pos.x));
        const py = Math.max(0, Math.min(drawC.height - 1, ~~pos.y));
        const d = dc.getImageData(px, py, 1, 1).data;
        if (d[3] > 10) {
            const hex = '#' + [d[0], d[1], d[2]].map(v => v.toString(16).padStart(2, '0')).join('');
            selectColor(hex);
            document.getElementById('color-picker-custom').value = hex;
        }
        return;
    }
    drawing = true; startX = pos.x; startY = pos.y; lastX = pos.x; lastY = pos.y;
    if (tool === 'pen' || tool === 'eraser') {
        saveHist();
        dc.globalAlpha = drawOpacity;
        if (tool === 'eraser') { dc.globalCompositeOperation = 'destination-out'; dc.lineWidth = brushSize * 3; }
        else { dc.globalCompositeOperation = 'source-over'; dc.strokeStyle = brushColor; dc.lineWidth = brushSize; }
        dc.lineCap = 'round'; dc.lineJoin = 'round';
        dc.beginPath(); dc.moveTo(pos.x, pos.y);
    } else if (tool === 'fill') {
        saveHist();
        floodFill(pos.x, pos.y, brushColor, dc, drawC);
        sendMsg({ type: 'DRAW_FILL', x: pos.x, y: pos.y, color: brushColor });
        sendDrawSnapshot();
        drawing = false;
    } else if (tool === 'spray') {
        saveHist();
        doSpray(pos.x, pos.y);
        sendMsg({ type: 'DRAW_SPRAY', x: pos.x, y: pos.y, color: brushColor, size: brushSize, opacity: drawOpacity, mirror: mirrorMode });
    }
}

function onMove(e) {
    if (!drawing) return;
    const pos = getPos(e);
    if (!pos) return;
    if (tool === 'pen' || tool === 'eraser') {
        const mid = { x: (lastX + pos.x) / 2, y: (lastY + pos.y) / 2 };
        dc.quadraticCurveTo(lastX, lastY, mid.x, mid.y); dc.stroke(); dc.beginPath(); dc.moveTo(mid.x, mid.y);
        if (mirrorMode && tool === 'pen') {
            const cw = drawC.width;
            dc.save(); dc.beginPath();
            dc.moveTo(cw - lastX, lastY);
            dc.quadraticCurveTo(cw - lastX, lastY, cw - mid.x, mid.y);
            dc.stroke(); dc.restore();
            dc.beginPath(); dc.moveTo(mid.x, mid.y);
        }
    } else if (tool === 'spray') {
        doSpray(pos.x, pos.y);
        sendMsg({ type: 'DRAW_SPRAY', x: pos.x, y: pos.y, color: brushColor, size: brushSize, opacity: drawOpacity, mirror: mirrorMode });
    }
    if (tool === 'pen' || tool === 'eraser') {
        sendMsg({
            type: 'DRAW_SEG',
            tool,
            x1: lastX,
            y1: lastY,
            x2: pos.x,
            y2: pos.y,
            color: brushColor,
            size: brushSize,
            opacity: drawOpacity,
            mirror: mirrorMode
        });
    }
    lastX = pos.x; lastY = pos.y;
}

function onUp(e) {
    if (!drawing) return;
    if (tool === 'pen' || tool === 'eraser') {
        dc.lineTo(lastX, lastY); dc.stroke(); dc.globalCompositeOperation = 'source-over'; dc.globalAlpha = 1;
        sendMsg({
            type: 'DRAW_SEG',
            tool,
            x1: lastX,
            y1: lastY,
            x2: lastX + 0.01,
            y2: lastY + 0.01,
            color: brushColor,
            size: brushSize,
            opacity: drawOpacity,
            mirror: mirrorMode
        });
    }
    drawing = false;
    sendDrawSnapshot();
}

function doSpray(cx, cy) {
    sprayStroke(dc, drawC, cx, cy, { color: brushColor, size: brushSize, opacity: drawOpacity, mirror: mirrorMode });
}

function getPos(e) {
    const r = drawC.getBoundingClientRect();
    return { x: (e.clientX - r.left) * (drawC.width / r.width), y: (e.clientY - r.top) * (drawC.height / r.height) };
}

function floodFill(px, py, hex, ctx = dc, canvas = drawC) {
    const W = canvas.width, H = canvas.height;
    const id = ctx.getImageData(0, 0, W, H);
    const data = id.data;
    px = Math.max(0, Math.min(W - 1, ~~px)); py = Math.max(0, Math.min(H - 1, ~~py));
    const target = [data[4*(py*W+px)], data[4*(py*W+px)+1], data[4*(py*W+px)+2], data[4*(py*W+px)+3]];
    const rgb = hexToRgb(hex);
    if (target[0]===rgb.r && target[1]===rgb.g && target[2]===rgb.b && target[3]===255) return;
    const visited = new Uint8Array(W * H);
    const stack = [[px, py]];
    while (stack.length) {
        const [x, y] = stack.pop();
        if (x < 0 || x >= W || y < 0 || y >= H) continue;
        const idx = y * W + x;
        if (visited[idx]) continue;
        visited[idx] = 1;
        const i4 = idx * 4;
        if (data[i4]!==target[0] || data[i4+1]!==target[1] || data[i4+2]!==target[2] || data[i4+3]!==target[3]) continue;
        data[i4] = rgb.r; data[i4+1] = rgb.g; data[i4+2] = rgb.b; data[i4+3] = 255;
        stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
    }
    ctx.putImageData(id, 0, 0);
}

function hexToRgb(hex) {
    return { r: parseInt(hex.substr(1, 2), 16), g: parseInt(hex.substr(3, 2), 16), b: parseInt(hex.substr(5, 2), 16) };
}

function saveHist() {
    if (drawHist.length >= 30) drawHist.shift();
    drawHist.push(dc.getImageData(0, 0, drawC.width, drawC.height));

function undoStroke() {

function redoStroke() {

}

function cropCanvas(src) {
    const SW = src.width, SH = src.height;
    const tmp = document.createElement('canvas');
    tmp.width = SW; tmp.height = SH;
    const ctx = tmp.getContext('2d');
    ctx.drawImage(src, 0, 0);
    const id = ctx.getImageData(0, 0, SW, SH);
    const data = id.data;
    let minX = SW, minY = SH, maxX = 0, maxY = 0;
    for (let i = 0; i < data.length; i += 4) {
        if (data[i + 3] > 10) {
            const idx = i / 4, x = idx % SW, y = Math.floor(idx / SW);
            if (x < minX) minX = x; if (x > maxX) maxX = x;
            if (y < minY) minY = y; if (y > maxY) maxY = y;
        }
    }
    if (maxX < minX) { const blank = document.createElement('canvas'); blank.width = blank.height = 8; return blank; }
    const pad = 8, w = maxX - minX + 1 + pad*2, h = maxY - minY + 1 + pad*2;
    const crop = document.createElement('canvas');
    crop.width = w; crop.height = h;
    crop.getContext('2d').drawImage(tmp, -(minX - pad), -(minY - pad));
    return crop;
}

async function release() {
    const canvas = cropCanvas(drawC);
    const scale = parseFloat(document.getElementById('fish-scale').value) || 1;
    const fishNameInput = document.getElementById('fish-name');
    const preparedName = await prepareFishName(fishNameInput.value, editingId || '');
    const name = preparedName.name;
    const kind = document.getElementById('fish-type').value;
    const releasePixels = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
    const img = canvas.toDataURL();
    fishNameInput.value = name;
    if (preparedName.reason === 'auto') notify(`✨ Named your ${kind.toLowerCase()} ${name}`, '#00c6ff');
    else if (preparedName.reason === 'moderated') notify(`✨ Kept it cozy and renamed this one ${name}`, '#ffd166');
    else if (preparedName.reason === 'duplicate') notify(`✨ ${name} was adjusted so every fish keeps a distinct name`, '#9fb4d1');
    if (![...releasePixels].some((value, index) => index % 4 === 3 && value > 0)) { notify('⚠️ Draw something first', '#ff4444'); return; }
    drawHist = [];
    dc.clearRect(0, 0, drawC.width, drawC.height);
    sendMsg({ type: 'DRAW_CLEAR' });

    if (editingId) {
        const existing = [...fishes, ...plants].find(f => f.id === editingId);
        if (existing) {
            if (existing.inContest && kind !== 'Fish') removeGlobalContestEntry(existing, true);
            existing.img = img; existing.name = name; existing.kind = kind; existing.speed = document.getElementById('fish-speed').value; existing.scale = scale;
            existing.libraryId = existing.libraryId || rnd6();
            fishes = fishes.filter(f => f.id !== editingId); plants = plants.filter(p => p.id !== editingId);
            if (kind === 'Fish') fishes.push(existing); else plants.push(existing);
            delete imgCache[existing.img]; existing.img = img;
            upsertCreatureTemplateFromFish(existing);
            rebuildGal(); sendMsg({ type: 'FISH_EDIT', id: editingId, fish: existing }); saveStorage();
            if (existing.inContest) submitFishGlobal(existing.id);
        }
        editingId = null; document.getElementById('edit-banner').style.display = 'none'; return;
    }

    const personality = PERSONALITIES[Math.floor(Math.random()*PERSONALITIES.length)];
    const rarityTable = [
        { name: 'Common', color: '#9fb4d1', weight: 60 },
        { name: 'Rare', color: '#5fd4ff', weight: 25 },
        { name: 'Epic', color: '#d291ff', weight: 11 },
        { name: 'Legendary', color: '#ffd166', weight: 4 }
    ];
    let rarityRoll = Math.random() * 100;
    let rarity = rarityTable[0];
    for (const candidate of rarityTable) {
        rarityRoll -= candidate.weight;
        if (rarityRoll <= 0) { rarity = candidate; break; }
    }
    const fx = Math.random() * (aqC.width - 100) + 50, fy = Math.random() * (aqC.height - 100) + 50;
    const fish = {
        id: rnd6(), libraryId: rnd6(), img, name, kind, personality, rarity: rarity.name, rarityColor: rarity.color,
        speed: document.getElementById('fish-speed').value, scale,
        x: fx, y: fy,
        vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 2, angle: 0, wobble: 0, ownerId: myId,
        bornAt: Date.now(), foodScore: 0, inFeedRace: false, inContest: false, contestEntryId: null, globalLikes: 0
    };

    if (kind === 'Fish') fishes.push(fish); else plants.push(fish);
    // Birth animation particles
    for (let i = 0; i < 20; i++) {
        particles.push({ x: fx, y: fy, vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4, life:40, color:'#00c6ff', r:2 });
    }
    releaseHist.push({ kind, fish });
    upsertCreatureTemplateFromFish(fish);
    sendMsg({ type: 'FISH_ADD', kind, fish });
    saveStorage(); addFCard(fish, kind);
    playSound('release');
    coins += 10; updateCoins(); localStorage.setItem('aqCoins', coins);
    const fishCount = fishes.length;
    if (kind === 'Fish') {
        if (fishCount === 1) unlockAch('first_fish');
        if (fishCount >= 10) unlockAch('ten_fish');
    } else {
        unlockAch('first_plant');
    }
    if (Object.keys(users).length > 1) unlockAch('multi_artist');
}

function undoRelease() {

function startEdit(id) {
    editingId = id;
    const fish = [...fishes, ...plants].find(f => f.id === id);
    if (!fish) return;
    if (fish.ownerId && fish.ownerId !== myId) return notify('Only the owner can edit this fish.', '#ff6666');
    document.getElementById('edit-banner').style.display = 'block';
    document.getElementById('edit-name').textContent = fish.name;
    document.getElementById('fish-name').value = fish.name;
    document.getElementById('fish-type').value = fish.kind;
    document.getElementById('fish-speed').value = fish.speed;
    document.getElementById('fish-scale').value = fish.scale;
    const img = new Image();
    img.onload = () => { dc.clearRect(0, 0, drawC.width, drawC.height); dc.drawImage(img, 0, 0); drawHist = []; };
    img.src = fish.img;
}

function removeFish(id) {
    const fish = [...fishes, ...plants].find(f => f.id === id);
    if (fish?.ownerId && fish.ownerId !== myId) return notify('Only the owner can remove this fish.', '#ff6666');
    if (!confirm('Remove?')) return;
    removeGlobalContestEntry(fish, true);
    fishes = fishes.filter(f => f.id !== id);
    plants = plants.filter(f => f.id !== id);
    removeContestByFishId(id);
    const card = document.getElementById('f-' + id);
    if (card) card.remove();
    sendMsg({ type: 'FISH_DEL', id });
    saveStorage();
}

function toggleDecoPanel(btn) {
    notify('Decorations are removed in this simpler build.', '#9fb4d1');
}

function dropDeco(emoji) {
    notify('Decorations are removed in this simpler build.', '#9fb4d1');
}

function notify(html, col) {
    const div = document.getElementById('notify');
    clearTimeout(notifyTimer);
    div.hidden = false;
    div.textContent = String(html || '');
    div.style.borderColor = col;
    div.style.display = 'block';
    notifyTimer = setTimeout(() => {
        div.style.display = 'none';
        div.hidden = true;
    }, 2500);
}

function appendChat(name, color, text) {
    const msgs = document.getElementById('chat-msgs');
    const msg = document.createElement('div');
    msg.className = 'chat-msg';
    const strong = document.createElement('strong');
    strong.style.color = color;
    strong.textContent = `${name}:`;
    msg.appendChild(strong);
    msg.appendChild(document.createTextNode(` ${String(text || '').substring(0, 100)}`));
    msgs.appendChild(msg);
    msgs.scrollTop = msgs.scrollHeight;
}

async function sendChat() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;
    const preview = await previewModeration('chat', text, '');
    const safeText = moderateChatText(preview.cleaned);
    if (!safeText) return;
    resumeAudio();
    input.value = '';
    if (preview.moderated) notify('💬 Kept that message kind for the room.', '#ffd166');
    sendMsg({ type: 'CHAT', name: myName, color: myColor, text: safeText });
    appendChat(myName, myColor, safeText);
    const ownerFish = fishes.find(f => f.ownerId === myId);
    if (ownerFish) { ownerFish.speech = safeText; ownerFish.speechExpires = Date.now() + 4000; }
    playSound('chat');
}

function quickChat(text) {
    document.getElementById('msg-input').value = text;
    sendChat();
}
function showAchievements() {
    const existing = document.getElementById('ach-panel');
    if (existing) { removePanel(existing); return; }
    closeMobileMenu();
    closeGlobalHub();
    closeFishStats();
    closeMyCreatures();
    const panel = document.createElement('div');
    panel.id = 'ach-panel';
    panel.style.cssText = window.innerWidth <= 768
        ? 'position:fixed;left:8px;right:8px;top:64px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px;z-index:2200;max-height:min(70vh,520px);overflow:auto;box-shadow:0 10px 24px rgba(0,0,0,0.5);'
        : 'position:fixed;top:45px;right:8px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;z-index:1500;max-width:260px;max-height:70vh;overflow:auto;box-shadow:0 6px 20px rgba(0,0,0,0.5);';
    let html = '<div style="font-weight:bold;margin-bottom:8px;color:#FFD700;">🏆 Achievements</div>';
    Object.entries(ACHIEVEMENTS).forEach(([k,a]) => {
        const unlocked = achievements[k];
        html += `<div style="padding:6px;margin:3px 0;background:var(--panel2);border-radius:4px;opacity:${unlocked?1:0.4};font-size:11px;"><b>${a.emoji} ${a.name}</b><br><span style="color:#aaa;font-size:10px;">${a.desc}</span></div>`;
    });
    panel.innerHTML = html;
    document.body.appendChild(panel);
    bindOutsideClose(panel, () => removePanel(panel));
}
function copyLink() {
    copyInviteLink();
}

function emptyTank() {
    if (roomCode && !isHost) return notify('Only the room creator can clear the tank.', '#ff6666');
    if (!confirm('Clear all?')) return;
    fishes = []; plants = []; foodPellets = [];
    document.getElementById('gal').innerHTML = '';
    sendMsg({ ...getRoomStatePayload(), fishes: [], plants: [] });
    saveStorage();
}

function loadStorage() {
    const data = localStorage.getItem('aq_' + roomCode);
    if (!data) return;
    try {
        const obj = JSON.parse(data);
        fishes = obj.fishes || [];
        plants = obj.plants || [];
        contestEntries = [];
        contestVotes = {};
        contestCycleStartedAt = 0;
        [...fishes, ...plants].forEach(fish => {
            fish.inContest = false;
            fish.globalLikes = 0;
            fish.contestEntryId = null;
        });
        currentTheme = obj.theme || 'Ocean'; nightMode = obj.night || false;
        rebuildGal(); setTheme(currentTheme, false);
        if (nightMode) updateNightMode();
    } catch (e) {}
}

function saveStorage() {
    localStorage.setItem('aq_' + roomCode, JSON.stringify({
        fishes: fishes.map(f => ({ ...f })),
        plants: plants.map(f => ({ ...f })),
        theme: currentTheme,
        night: nightMode
    }));
}

function randName() {
    return FISH_NAMES[Math.floor(Math.random() * FISH_NAMES.length)];
}

function setTheme(t, sync = true) {
    if (sync && roomCode && !isHost) return notify('Only the room creator can change the tank theme.', '#ff6666');
    currentTheme = t;
    const theme = THEMES[t] || THEMES.Ocean;
    aqC.style.background = `linear-gradient(180deg, ${theme.sky} 0%, ${theme.bottom} 100%)`;
    saveStorage();
    syncControlStates();
    if (sync && roomCode) sendMsg({ type: 'THEME', theme: t });
}

function updateNightMode() {
    aqC.style.filter = `brightness(${nightMode ? 0.5 : 1})`;
}

function toggleNight() {
    if (roomCode && !isHost) return notify('Only the room creator can switch day and night.', '#ff6666');
    nightMode = !nightMode;
    updateNightMode();
    syncControlStates();
    saveStorage();
    if (roomCode) sendMsg({ type: 'NIGHT', night: nightMode });
    if (nightMode) unlockAch('night_diver');
}

function addBubble() {
    bubbles.push({ x: Math.random() * aqC.width, y: aqC.height, r: Math.random() * 3 + 2, vy: -(Math.random() * 1 + 0.5), vx: (Math.random() - 0.5) * 0.5 });
}

const imgCache = {};
function getCachedImg(src) {
    if (!imgCache[src]) { const img = new Image(); img.src = src; imgCache[src] = img; }
    return imgCache[src];
}

function loop() {
    const W = aqC.width, H = aqC.height;
    ac.clearRect(0, 0, W, H); tick++;
    if (tick % 300 === 0 && myId) loadGlobalContestState(true);

    const sweedColors = ['#1a6b3f', '#2d8a50', '#3aa860', '#1d7048', '#4db870'];
    for (let i = 0; i < 7; i++) {
        const baseX = 20 + (i * (W - 40)) / 6;
        const stalks = (i % 2) + 1;
        for (let s = 0; s < stalks; s++) {
            const sx = baseX + s * 8 - (stalks - 1) * 4;
            const sh = H * 0.15 + (i % 3) * (H * 0.05) + s * (H * 0.02);
            const bend1 = Math.sin(tick * 0.022 + i * 1.3) * 12;
            ac.strokeStyle = sweedColors[(i + s) % sweedColors.length];
            ac.lineWidth = 2; ac.lineCap = 'round';
            ac.beginPath(); ac.moveTo(sx, H);
            ac.quadraticCurveTo(sx + bend1, H - sh * 0.4, sx + bend1 * 0.5, H - sh);
            ac.stroke();
        }
    }

    if (tick % 35 === 0) addBubble();
    for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        b.x += Math.sin(tick * 0.05 + i) * 0.3; b.y += b.vy;
        const alpha = Math.min(1, (H - b.y) / 80) * 0.3;
        ac.strokeStyle = `rgba(190,225,255,${alpha})`; ac.lineWidth = 1;
        ac.beginPath(); ac.arc(b.x, b.y, b.r, 0, Math.PI * 2); ac.stroke();
        if (b.y < -b.r) bubbles.splice(i, 1);
    }

    for (let i = foodPellets.length - 1; i >= 0; i--) {
        const pellet = foodPellets[i];
        pellet.y = Math.min(H - 10, pellet.y + pellet.vy);
        pellet.life--;
        ac.fillStyle = 'rgba(255, 209, 102, 0.95)';
        ac.beginPath();
        ac.arc(pellet.x, pellet.y, pellet.r, 0, Math.PI * 2);
        ac.fill();
        if (pellet.life <= 0) foodPellets.splice(i, 1);
    }

    plants.forEach(p => {
        const img = getCachedImg(p.img);
        if (!img.complete) return;
        const sway = Math.sin(tick * 0.022 + (p.x / W) * 2) * 0.1;
        const iw = img.naturalWidth * p.scale * 0.5, ih = img.naturalHeight * p.scale * 0.5;
        ac.save(); ac.translate(p.x, H - 6); ac.rotate(sway); ac.drawImage(img, -iw / 2, -ih, iw, ih); ac.restore();
    });

    fishes.forEach(f => {
        const spd = { Lazy: 0.4, Calm: 1.1, Fast: 2.2, Turbo: 4.0 }[f.speed] || 1.1;
        let targetPellet = null;
        let closestPellet = Infinity;
        foodPellets.forEach(pellet => {
            const dist = Math.hypot((pellet.x || 0) - f.x, (pellet.y || 0) - f.y);
            if (dist < closestPellet && dist < 170) {
                closestPellet = dist;
                targetPellet = pellet;
            }
        });
        if (targetPellet) {
            const dx = targetPellet.x - f.x;
            const dy = targetPellet.y - f.y;
            const len = Math.max(1, Math.hypot(dx, dy));
            f.vx += (dx / len) * 0.08;
            f.vy += (dy / len) * 0.04;
            const maxDrift = 1.6;
            f.vx = Math.max(-maxDrift, Math.min(maxDrift, f.vx));
            f.vy = Math.max(-maxDrift, Math.min(maxDrift, f.vy));
            if (closestPellet < 24) {
                const idx = foodPellets.indexOf(targetPellet);
                if (idx >= 0) foodPellets.splice(idx, 1);
                if (f.ownerId === myId) {
                    f.foodScore = (f.foodScore || 0) + 1;
                    sendMsg({ type: 'FOOD_EAT', pelletId: targetPellet.id, fishId: f.id, foodScore: f.foodScore || 0 });
                }
                particles.push({ x: f.x, y: f.y, life: 22, color: '#ffd166', r: 3 });
                playSound('bubble');
                syncFeedState(f);
            }
        }
        f.x += f.vx * spd; f.y += f.vy * spd;
        const wobble = Math.sin(tick * spd * 0.12) * 0.15;
        const angle = Math.atan2(f.vy, f.vx) + wobble;
        const pad = 30;
        if (f.x < pad) f.vx = Math.abs(f.vx); if (f.x > W - pad) f.vx = -Math.abs(f.vx);
        if (f.y < pad) f.vy = Math.abs(f.vy); if (f.y > H - pad) f.vy = -Math.abs(f.vy);
        const img = getCachedImg(f.img);
        if (!img.complete) return;
        const iw = img.naturalWidth * f.scale * 0.5, ih = img.naturalHeight * f.scale * 0.5;
        ac.save(); ac.translate(f.x, f.y); ac.rotate(angle);
        if (f.vx < 0) ac.scale(-1, 1);
        ac.drawImage(img, -iw / 2, -ih / 2, iw, ih);
        if (f.vx < 0) ac.scale(-1, 1); // flip text back
        ac.textAlign = 'center';
        // Name bubble
        ac.font = 'bold 11px sans-serif';
        const nameW = ac.measureText(f.name).width + 10;
        ac.fillStyle = 'rgba(0,0,0,0.55)';
        ac.beginPath(); ac.roundRect ? ac.roundRect(-nameW/2, -ih/2 - 20, nameW, 14, 7) : ac.rect(-nameW/2, -ih/2 - 20, nameW, 14); ac.fill();
        ac.fillStyle = '#fff'; ac.fillText(f.name, 0, -ih / 2 - 9);
        // Owner label
        const owner = users[f.ownerId];
        if (owner) {
            ac.font = '9px sans-serif';
            ac.fillStyle = owner.color || 'rgba(255,255,255,0.8)';
            ac.fillText('by ' + owner.name, 0, ih/2 + 12);
        }
        // Speech bubble
        if (f.speech && f.speechExpires > Date.now()) {
            ac.font = '11px sans-serif';
            const tw = Math.min(160, ac.measureText(f.speech).width + 14);
            ac.fillStyle = 'rgba(255,255,255,0.95)';
            ac.beginPath(); ac.roundRect ? ac.roundRect(-tw/2, -ih/2 - 42, tw, 18, 9) : ac.rect(-tw/2, -ih/2 - 42, tw, 18); ac.fill();
            ac.fillStyle = '#111'; ac.fillText(f.speech, 0, -ih/2 - 29);
        }
        ac.restore();
    });

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        if (p.vx !== undefined) { p.x += p.vx; p.y += p.vy; p.vy += 0.05; }
        p.life--;
        const a = Math.max(0, p.life / 40);
        ac.fillStyle = p.color || '#fff';
        ac.globalAlpha = a;
        ac.beginPath(); ac.arc(p.x, p.y, p.r || 2, 0, Math.PI*2); ac.fill();
        ac.globalAlpha = 1;
        if (p.life <= 0) particles.splice(i, 1);
    }

    requestAnimationFrame(loop);
}

document.addEventListener('DOMContentLoaded', () => { initWelcome(); });
document.getElementById('color-picker-custom').addEventListener('input', e => { selectColor(e.target.value); });

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
        const aq = document.getElementById('aqC');
        if (!aq) return;
        aq.addEventListener('pointerdown', e => {
            if (!feedMode) return;
            const pos = getAqPos(e);
            const pelletId = `drop_${rnd6()}`;
            dropFood(pos.x, pos.y, pelletId);
            sendMsg({ type: 'FOOD_DROP', x: pos.x, y: pos.y, pelletId });
            e.preventDefault();
        });
        aq.addEventListener('click', e => {
            const pos = getAqPos(e);
            const cx = pos.x, cy = pos.y;
            if (feedMode) return;
            let nearFish = null, nearDist = 55;
            [...fishes, ...plants].forEach(f => {
                const d = Math.hypot(f.x - cx, f.y - cy);
                if (d < nearDist) { nearDist = d; nearFish = f; }
            });
            if (nearFish) {
                const menu = document.createElement('div');
                const isMobileMenu = window.innerWidth <= 768;
                menu.style.cssText = isMobileMenu
                    ? 'position:fixed;left:50%;bottom:16px;transform:translateX(-50%);width:min(320px,calc(100vw - 20px));background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px;z-index:2300;font-size:11px;box-shadow:0 14px 30px rgba(0,0,0,0.45);'
                    : `position:fixed;left:${Math.min(e.clientX, window.innerWidth - 150)}px;top:${Math.min(e.clientY, window.innerHeight - 100)}px;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:8px;z-index:2000;font-size:11px;`;
                const ownFish = nearFish.ownerId === myId;
                const canCompete = ownFish && nearFish.kind === 'Fish';
                let actions = `<button onclick="showFishStats('${nearFish.id}');removePanel(this.parentElement);" style="display:block;width:100%;background:var(--panel2);border:1px solid var(--border);color:white;padding:6px;border-radius:6px;cursor:pointer;margin-bottom:4px;font-size:11px;">ℹ️ View Stats</button>`;
                if (ownFish) {
                    actions += `<button onclick="startEdit('${nearFish.id}');this.parentElement.remove();" style="display:block;width:100%;background:var(--accent);border:none;color:white;padding:5px;border-radius:3px;cursor:pointer;margin-bottom:3px;font-size:11px;">✏️ Edit</button>`;
                    actions += `<button onclick="removeFish('${nearFish.id}');this.parentElement.remove();" style="display:block;width:100%;background:#cc3333;border:none;color:white;padding:5px;border-radius:3px;cursor:pointer;font-size:11px;">🗑️ Remove</button>`;
                    if (canCompete) {
                        actions += `<button onclick="submitFishGlobal('${nearFish.id}');this.parentElement.remove();" style="display:block;width:100%;background:#2d8cff;border:none;color:white;padding:5px;border-radius:3px;cursor:pointer;margin-top:3px;font-size:11px;">🏆 Join Contest</button>`;
                    }
                }
                menu.innerHTML = `
                    <div style="font-weight:bold;color:var(--accent);margin-bottom:4px;">${escapeHtml(nearFish.name)}</div>
                    <div style="font-size:10px;color:${nearFish.rarityColor || '#9fb4d1'};margin-bottom:4px;">${escapeHtml(nearFish.rarity || 'Common')} · ${escapeHtml(nearFish.personality || 'Friendly')} · ❤️ ${nearFish.globalLikes || 0}</div>
                    ${actions}
                `;
                document.body.appendChild(menu);
                bindOutsideClose(menu, () => removePanel(menu));
                return;
            }
            fishes.forEach(f => {
                const dx = f.x - cx, dy = f.y - cy;
                if (Math.hypot(dx, dy) < 80) {
                    f.vx += (dx / 100) * 1.5; f.vy += (dy / 100) * 1.5;
                }
            });
        });
    }, 600);
});
